<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AVA - Asistente Holográfico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            touch-action: none;
        }

        /* Scan lines effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 157, 0.02) 2px,
                rgba(0, 255, 157, 0.02) 4px
            );
        }

        /* Particles canvas */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Three.js canvas */
        #avatar-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Base platform ring */
        .base-ring {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 60px;
            border: 3px solid #00ff9d;
            border-radius: 50%;
            z-index: 20;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.5), inset 0 0 20px rgba(0, 255, 157, 0.2);
        }

        .base-ring::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 50px;
            border: 2px solid rgba(0, 255, 157, 0.5);
            border-radius: 50%;
        }

        .base-ring::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 40px;
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 50%;
        }

        /* States for base ring */
        .base-ring.idle {
            border-color: #00ff9d;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3), inset 0 0 15px rgba(0, 255, 157, 0.1);
            animation: pulse-slow 3s ease-in-out infinite;
        }

        .base-ring.listening {
            border-color: #00aaff;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.6), inset 0 0 30px rgba(0, 170, 255, 0.3);
            animation: pulse-fast 0.8s ease-in-out infinite;
        }

        .base-ring.thinking {
            border-color: #ffaa00;
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.5), inset 0 0 25px rgba(255, 170, 0, 0.2);
            animation: blink 0.5s ease-in-out infinite;
        }

        .base-ring.talking {
            border-color: #00ff9d;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.8), inset 0 0 40px rgba(0, 255, 157, 0.4);
            animation: pulse-talk 0.3s ease-in-out infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes pulse-talk {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.08); }
        }

        /* Branding */
        .branding {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 12px;
            color: #00ff9d;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8), 0 0 40px rgba(0, 255, 157, 0.4);
            pointer-events: none;
        }

        /* Status text */
        .status-container {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .status-text {
            font-size: 14px;
            color: rgba(0, 255, 157, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .transcript {
            font-size: 16px;
            color: #ffffff;
            min-height: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .response {
            font-size: 18px;
            color: #00ff9d;
            margin-top: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.5);
            line-height: 1.4;
            max-height: 80px;
            overflow: hidden;
        }

        /* Main button */
        .mic-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 157, 0.2) 0%, transparent 70%);
            border: 3px solid #00ff9d;
            z-index: 60;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .mic-button:active {
            transform: translateX(-50%) scale(0.95);
        }

        .mic-button svg {
            width: 35px;
            height: 35px;
            fill: #00ff9d;
            filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.8));
        }

        .mic-button.listening {
            border-color: #00aaff;
            background: radial-gradient(circle, rgba(0, 170, 255, 0.3) 0%, transparent 70%);
            animation: mic-pulse 1s ease-in-out infinite;
        }

        .mic-button.listening svg {
            fill: #00aaff;
            filter: drop-shadow(0 0 10px rgba(0, 170, 255, 0.9));
        }

        @keyframes mic-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 170, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 170, 255, 0.8); }
        }

        /* Config overlay */
        .config-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .config-overlay.hidden {
            display: none;
        }

        .config-title {
            font-size: 28px;
            color: #00ff9d;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8);
        }

        .config-form {
            width: 100%;
            max-width: 400px;
        }

        .config-label {
            display: block;
            color: #00ff9d;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .config-input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 255, 157, 0.1);
            border: 2px solid #00ff9d;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
        }

        .config-input:focus {
            background: rgba(0, 255, 157, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }

        .config-textarea {
            min-height: 100px;
            resize: none;
        }

        .config-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00ff9d, #00aaff);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .config-button:active {
            transform: scale(0.98);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        .config-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }

        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 157, 0.3);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Scan lines overlay -->
    <div class="scanlines"></div>

    <!-- Particles canvas -->
    <canvas id="particles"></canvas>

    <!-- Three.js canvas for avatar -->
    <canvas id="avatar-canvas"></canvas>

    <!-- Base ring -->
    <div class="base-ring idle" id="base-ring"></div>

    <!-- Branding -->
    <div class="branding">A V A</div>

    <!-- Status and text -->
    <div class="status-container">
        <div class="status-text" id="status-text">LISTA</div>
        <div class="transcript" id="transcript"></div>
        <div class="response" id="response"></div>
    </div>

    <!-- Mic button -->
    <div class="mic-button idle" id="mic-button">
        <svg viewBox="0 0 24 24" id="mic-icon">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <svg viewBox="0 0 24 24" id="stop-icon" style="display: none;">
            <path d="M6 6h12v12H6z"/>
        </svg>
    </div>

    <!-- Config overlay -->
    <div class="config-overlay" id="config-overlay">
        <div class="config-title">A V A</div>
        <div class="config-form">
            <label class="config-label">URL del Endpoint API</label>
            <input type="text" class="config-input" id="api-url" placeholder="https://tu-app.vercel.app/api/chat">
            
            <label class="config-label">System Prompt</label>
            <textarea class="config-input config-textarea" id="system-prompt">Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.</textarea>
            
            <button class="config-button" id="activate-btn">ACTIVAR AVA</button>
            
            <div class="config-hint">Ctrl+R para resetear configuración</div>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ==========================================
        // CONFIGURATION & STATE
        // ==========================================
        let config = {
            apiUrl: localStorage.getItem('ava_api_url') || '',
            systemPrompt: localStorage.getItem('ava_system_prompt') || 'Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.'
        };

        let state = 'IDLE'; // IDLE, LISTENING, THINKING, TALKING
        let messageHistory = [];
        let recognition = null;
        let synthesis = window.speechSynthesis;
        let currentUtterance = null;

        // ==========================================
        // THREE.JS AVATAR SETUP
        // ==========================================
        let scene, camera, renderer, avatar, avatarGroup;
        let particles = [];
        let time = 0;

        function initThreeJS() {
            const canvas = document.getElementById('avatar-canvas');
            
            // Scene
            scene = new THREE.Scene();
            
            // Camera - optimized for portrait
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);
            camera.lookAt(0, 0.5, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Lights
            const ambientLight = new THREE.AmbientLight(0x00ff9d, 0.3);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00ff9d, 1, 10);
            pointLight.position.set(2, 3, 2);
            scene.add(pointLight);

            const pointLight2 = new THREE.PointLight(0x00aaff, 0.8, 10);
            pointLight2.position.set(-2, 2, 2);
            scene.add(pointLight2);

            // Create holographic avatar
            createAvatar();

            // Handle resize
            window.addEventListener('resize', onWindowResize);

            // Start animation loop
            animate();
        }

        function createAvatar() {
            avatarGroup = new THREE.Group();

            // Material holográfico
            const holographicMaterial = new THREE.MeshStandardMaterial({
                color: 0x00ff9d,
                emissive: 0x00ff9d,
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 0.9,
                roughness: 0.2,
                metalness: 0.8
            });

            const wireframeMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff9d,
                wireframe: true,
                transparent: true,
                opacity: 0.3
            });

            // Head
            const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
            const head = new THREE.Mesh(headGeo, holographicMaterial);
            head.position.y = 1.6;
            avatarGroup.add(head);

            const headWire = new THREE.Mesh(headGeo, wireframeMaterial);
            headWire.position.y = 1.6;
            headWire.scale.set(1.05, 1.05, 1.05);
            avatarGroup.add(headWire);

            // Torso
            const torsoGeo = new THREE.CylinderGeometry(0.2, 0.15, 0.6, 12);
            const torso = new THREE.Mesh(torsoGeo, holographicMaterial);
            torso.position.y = 1.1;
            avatarGroup.add(torso);

            const torsoWire = new THREE.Mesh(torsoGeo, wireframeMaterial);
            torsoWire.position.y = 1.1;
            torsoWire.scale.set(1.05, 1.02, 1.05);
            avatarGroup.add(torsoWire);

            // Shoulders
            const shoulderGeo = new THREE.SphereGeometry(0.15, 12, 12);
            
            const leftShoulder = new THREE.Mesh(shoulderGeo, holographicMaterial);
            leftShoulder.position.set(-0.35, 1.3, 0);
            avatarGroup.add(leftShoulder);

            const rightShoulder = new THREE.Mesh(shoulderGeo, holographicMaterial);
            rightShoulder.position.set(0.35, 1.3, 0);
            avatarGroup.add(rightShoulder);

            // Arms
            const armGeo = new THREE.CylinderGeometry(0.06, 0.05, 0.5, 8);
            
            const leftArm = new THREE.Mesh(armGeo, holographicMaterial);
            leftArm.position.set(-0.45, 0.9, 0);
            leftArm.rotation.z = 0.1;
            avatarGroup.add(leftArm);

            const rightArm = new THREE.Mesh(armGeo, holographicMaterial);
            rightArm.position.set(0.45, 0.9, 0);
            rightArm.rotation.z = -0.1;
            avatarGroup.add(rightArm);

            // Base platform
            const baseGeo = new THREE.CylinderGeometry(0.8, 0.9, 0.1, 32);
            const baseMat = new THREE.MeshBasicMaterial({
                color: 0x00ff9d,
                transparent: true,
                opacity: 0.2,
                wireframe: true
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -0.05;
            avatarGroup.add(base);

            // Floating particles around avatar
            for (let i = 0; i < 20; i++) {
                const particleGeo = new THREE.SphereGeometry(0.02, 8, 8);
                const particleMat = new THREE.MeshBasicMaterial({
                    color: 0x00ff9d,
                    transparent: true,
                    opacity: 0.6
                });
                const particle = new THREE.Mesh(particleGeo, particleMat);
                
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.6 + Math.random() * 0.4;
                const height = 0.5 + Math.random() * 1.5;
                
                particle.position.set(
                    Math.cos(angle) * radius,
                    height,
                    Math.sin(angle) * radius
                );
                
                particle.userData = {
                    angle: angle,
                    radius: radius,
                    height: height,
                    speed: 0.005 + Math.random() * 0.01,
                    floatSpeed: 0.5 + Math.random() * 0.5,
                    floatOffset: Math.random() * Math.PI * 2
                };
                
                avatarGroup.add(particle);
                particles.push(particle);
            }

            scene.add(avatarGroup);
            avatar = avatarGroup;
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            if (avatar) {
                // State-based animations
                switch (state) {
                    case 'IDLE':
                        // Gentle floating
                        avatar.position.y = Math.sin(time * 0.8) * 0.05;
                        avatar.rotation.y = Math.sin(time * 0.2) * 0.05;
                        break;
                        
                    case 'LISTENING':
                        // Slow pulse
                        avatar.position.y = Math.sin(time * 2) * 0.03;
                        const listenScale = 1 + Math.sin(time * 3) * 0.02;
                        avatar.scale.set(listenScale, listenScale, listenScale);
                        break;
                        
                    case 'THINKING':
                        // Active rotation and blinking
                        avatar.rotation.y += 0.02;
                        avatar.position.y = Math.sin(time * 4) * 0.08;
                        const thinkScale = 1 + Math.sin(time * 8) * 0.03;
                        avatar.scale.set(thinkScale, thinkScale, thinkScale);
                        break;
                        
                    case 'TALKING':
                        // Fast pulse
                        const talkScale = 1 + Math.sin(time * 15) * 0.04;
                        avatar.scale.set(talkScale, 1, talkScale);
                        avatar.position.y = Math.sin(time * 5) * 0.02;
                        break;
                }

                // Animate particles
                particles.forEach((p, i) => {
                    p.userData.angle += p.userData.speed;
                    p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
                    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
                    p.position.y = p.userData.height + Math.sin(time * p.userData.floatSpeed + p.userData.floatOffset) * 0.1;
                    p.material.opacity = 0.4 + Math.sin(time * 2 + i) * 0.3;
                });
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==========================================
        // PARTICLES CANVAS (2D overlay)
        // ==========================================
        function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particleArray = [];
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                particleArray.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedY: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particleArray.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 157, ${p.opacity})`;
                    ctx.fill();

                    p.y -= p.speedY;
                    if (p.y < -10) {
                        p.y = canvas.height + 10;
                        p.x = Math.random() * canvas.width;
                    }
                });

                requestAnimationFrame(animateParticles);
            }

            animateParticles();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ==========================================
        // SPEECH RECOGNITION
        // ==========================================
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                updateStatus('Reconocimiento de voz no soportado');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'es-MX';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                setState('LISTENING');
                updateStatus('ESCUCHANDO...');
                document.getElementById('transcript').textContent = '';
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('transcript').textContent = transcript;
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                updateStatus('Error: ' + event.error);
                setState('IDLE');
            };

            recognition.onend = () => {
                const transcript = document.getElementById('transcript').textContent.trim();
                if (transcript && state === 'LISTENING') {
                    processMessage(transcript);
                } else if (state === 'LISTENING') {
                    setState('IDLE');
                    updateStatus('LISTA');
                }
            };
        }

        function toggleMic() {
            if (state === 'TALKING') {
                stopSpeaking();
                return;
            }

            if (state === 'LISTENING') {
                recognition.stop();
                setState('IDLE');
                updateStatus('LISTA');
                return;
            }

            if (recognition) {
                try {
                    recognition.start();
                } catch (e) {
                    console.error('Error starting recognition:', e);
                }
            }
        }

        // ==========================================
        // SPEECH SYNTHESIS
        // ==========================================
        function speak(text) {
            // Clean markdown
            const cleanText = text
                .replace(/\*\*/g, '')
                .replace(/\*/g, '')
                .replace(/#/g, '')
                .replace(/`/g, '')
                .replace(/\[|\]/g, '')
                .replace(/\(|\)/g, '');

            // Stop any current speech
            synthesis.cancel();

            currentUtterance = new SpeechSynthesisUtterance(cleanText);
            currentUtterance.lang = 'es-MX';
            currentUtterance.pitch = 1.1;
            currentUtterance.rate = 1.05;

            // Find Spanish female voice
            const voices = synthesis.getVoices();
            const spanishVoice = voices.find(v => 
                v.lang.startsWith('es') && v.name.toLowerCase().includes('female')
            ) || voices.find(v => v.lang.startsWith('es'));
            
            if (spanishVoice) {
                currentUtterance.voice = spanishVoice;
            }

            currentUtterance.onstart = () => {
                setState('TALKING');
                updateStatus('HABLANDO...');
            };

            currentUtterance.onend = () => {
                setState('IDLE');
                updateStatus('LISTA');
                document.getElementById('response').textContent = '';
            };

            currentUtterance.onerror = (event) => {
                console.error('Speech synthesis error:', event);
                setState('IDLE');
                updateStatus('LISTA');
            };

            synthesis.speak(currentUtterance);
        }

        function stopSpeaking() {
            synthesis.cancel();
            setState('IDLE');
            updateStatus('LISTA');
        }

        // ==========================================
        // API COMMUNICATION
        // ==========================================
        async function processMessage(userMessage) {
            setState('THINKING');
            updateStatus('PENSANDO...');
            document.getElementById('response').textContent = '';

            // Add to history
            messageHistory.push({ role: 'user', content: userMessage });
            
            // Keep only last 10 messages
            if (messageHistory.length > 10) {
                messageHistory = messageHistory.slice(-10);
            }

            try {
                const response = await fetch(config.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: messageHistory,
                        system: config.systemPrompt
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Try multiple response formats
                let assistantMessage = 
                    data.content?.[0]?.text ||
                    data.message ||
                    data.response ||
                    data.choices?.[0]?.message?.content ||
                    data.text ||
                    JSON.stringify(data);

                // Add to history
                messageHistory.push({ role: 'assistant', content: assistantMessage });

                // Display and speak
                document.getElementById('response').textContent = assistantMessage.substring(0, 120);
                speak(assistantMessage);

            } catch (error) {
                console.error('API error:', error);
                updateStatus('Error de conexión');
                speak('Lo siento, no pude conectar con el servidor. Verifica la configuración.');
            }
        }

        // ==========================================
        // UI & STATE MANAGEMENT
        // ==========================================
        function setState(newState) {
            state = newState;
            
            const baseRing = document.getElementById('base-ring');
            const micButton = document.getElementById('mic-button');
            const micIcon = document.getElementById('mic-icon');
            const stopIcon = document.getElementById('stop-icon');

            // Reset classes
            baseRing.className = 'base-ring';
            micButton.className = 'mic-button';

            switch (state) {
                case 'IDLE':
                    baseRing.classList.add('idle');
                    micButton.classList.add('idle');
                    micIcon.style.display = 'block';
                    stopIcon.style.display = 'none';
                    break;
                    
                case 'LISTENING':
                    baseRing.classList.add('listening');
                    micButton.classList.add('listening');
                    micIcon.style.display = 'block';
                    stopIcon.style.display = 'none';
                    break;
                    
                case 'THINKING':
                    baseRing.classList.add('thinking');
                    micButton.classList.add('thinking');
                    micIcon.style.display = 'none';
                    stopIcon.style.display = 'block';
                    break;
                    
                case 'TALKING':
                    baseRing.classList.add('talking');
                    micButton.classList.add('talking');
                    micIcon.style.display = 'none';
                    stopIcon.style.display = 'block';
                    break;
            }
        }

        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }

        // ==========================================
        // CONFIGURATION
        // ==========================================
        function showConfig() {
            document.getElementById('config-overlay').classList.remove('hidden');
            document.getElementById('api-url').value = config.apiUrl;
            document.getElementById('system-prompt').value = config.systemPrompt;
        }

        function hideConfig() {
            document.getElementById('config-overlay').classList.add('hidden');
        }

        function saveConfig() {
            const apiUrl = document.getElementById('api-url').value.trim();
            const systemPrompt = document.getElementById('system-prompt').value.trim();

            if (!apiUrl) {
                alert('Por favor ingresa la URL del endpoint API');
                return;
            }

            config.apiUrl = apiUrl;
            config.systemPrompt = systemPrompt;

            localStorage.setItem('ava_api_url', apiUrl);
            localStorage.setItem('ava_system_prompt', systemPrompt);

            hideConfig();
        }

        function resetConfig() {
            if (confirm('¿Resetear configuración?')) {
                localStorage.removeItem('ava_api_url');
                localStorage.removeItem('ava_system_prompt');
                config.apiUrl = '';
                config.systemPrompt = 'Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.';
                showConfig();
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function init() {
            // Initialize Three.js
            initThreeJS();

            // Initialize particles
            initParticles();

            // Initialize speech recognition
            initSpeechRecognition();

            // Check configuration
            if (!config.apiUrl) {
                showConfig();
            }

            // Event listeners
            document.getElementById('mic-button').addEventListener('click', toggleMic);
            document.getElementById('mic-button').addEventListener('touchstart', (e) => {
                e.preventDefault();
                toggleMic();
            });

            document.getElementById('activate-btn').addEventListener('click', saveConfig);

            // Keyboard shortcut (Space)
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !e.repeat) {
                    e.preventDefault();
                    toggleMic();
                }
                if (e.ctrlKey && e.key === 'r') {
                    e.preventDefault();
                    resetConfig();
                }
            });

            // Load voices for speech synthesis
            synthesis.onvoiceschanged = () => {
                synthesis.getVoices();
            };

            console.log('AVA initialized');
        }

        // Start when loaded
        window.addEventListener('load', init);
    </script>
</body>
</html>
