<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AVA - Holographic AI Assistant</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Roboto',sans-serif;touch-action:none;background:#000}

        /* === Atmosphere background === */
        .atmosphere{position:fixed;inset:0;z-index:0;
            background:radial-gradient(ellipse 120% 100% at 50% 110%, #0a0e2a 0%, #050818 40%, #000 70%);
        }
        .atmosphere::after{content:'';position:absolute;inset:0;
            background:radial-gradient(ellipse 60% 50% at 50% 80%, rgba(0,255,157,.04) 0%, transparent 60%);
        }

        /* === Scanlines === */
        .scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,157,.015) 2px,rgba(0,255,157,.015) 4px);
        }

        /* === Three.js canvas === */
        #avatar-canvas{position:fixed;inset:0;z-index:10}

        /* === Particles overlay === */
        #particles{position:fixed;inset:0;pointer-events:none;z-index:50}

        /* === Holo glow === */
        .holo-glow{position:fixed;inset:0;pointer-events:none;z-index:11;
            background:radial-gradient(ellipse 50% 70% at 50% 55%, rgba(0,255,157,.035) 0%, transparent 65%);
        }

        /* === Branding === */
        .branding{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:60;
            font-size:30px;font-weight:200;letter-spacing:14px;color:#00ff9d;
            text-shadow:0 0 20px rgba(0,255,157,.7),0 0 40px rgba(0,255,157,.3);
            pointer-events:none;user-select:none;
        }

        /* === Avatar selector === */
        .avatar-selector{position:fixed;top:62px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:60}
        .avatar-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.25);cursor:pointer;transition:.3s}
        .avatar-dot:hover{transform:scale(1.4)}
        .avatar-dot.active{box-shadow:0 0 14px currentColor;border-color:#fff;transform:scale(1.25)}

        /* === Capability panel === */
        .capability{position:fixed;top:95px;left:50%;transform:translateX(-50%);text-align:center;z-index:55;max-width:85%}
        .cap-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;opacity:.8}
        .cap-skills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
        .skill-tag{background:rgba(0,255,157,.08);border:1px solid rgba(0,255,157,.25);padding:2px 8px;border-radius:12px;font-size:9px}

        /* === Base ring (3D decoration behind avatar, behind everything) === */
        .base-ring{position:fixed;bottom:4px;left:50%;transform:translateX(-50%);
            width:200px;height:52px;border:2px solid #00ff9d;border-radius:50%;z-index:15;transition:.3s;
            box-shadow:0 0 20px rgba(0,255,157,.4),inset 0 0 15px rgba(0,255,157,.15);pointer-events:none}
        .base-ring::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            width:178px;height:42px;border:1px solid rgba(0,255,157,.35);border-radius:50%}
        .base-ring.idle{animation:pulse-slow 3s ease-in-out infinite}
        .base-ring.listening{border-color:#00aaff;box-shadow:0 0 30px rgba(0,170,255,.5);animation:pulse-fast .8s ease-in-out infinite}
        .base-ring.thinking{border-color:#ffaa00;box-shadow:0 0 25px rgba(255,170,0,.4);animation:blink-ring .5s ease-in-out infinite}
        .base-ring.talking{border-color:#00ff9d;box-shadow:0 0 40px rgba(0,255,157,.7);animation:pulse-talk .3s ease-in-out infinite}
        @keyframes pulse-slow{0%,100%{opacity:.55;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.02)}}
        @keyframes pulse-fast{0%,100%{opacity:.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.05)}}
        @keyframes blink-ring{0%,100%{opacity:1}50%{opacity:.25}}
        @keyframes pulse-talk{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.07)}}

        /* === Status & response === */
        .status-area{position:fixed;bottom:270px;left:50%;transform:translateX(-50%);
            z-index:60;text-align:center;width:90%;max-width:500px;pointer-events:none}
        .status-text{font-size:11px;color:rgba(0,255,157,.65);text-transform:uppercase;letter-spacing:3px;margin-bottom:4px}
        .transcript{font-size:13px;color:#fff;min-height:18px;text-shadow:0 0 8px rgba(255,255,255,.2)}
        .response{font-size:14px;color:#00ff9d;margin-top:4px;text-shadow:0 0 12px rgba(0,255,157,.4);line-height:1.35;max-height:56px;overflow:hidden}

        /* === Chat input === */
        .chat-box{position:fixed;bottom:108px;left:50%;transform:translateX(-50%);
            z-index:65;width:88vw;max-width:440px;display:flex;gap:8px}
        .chat-box.hidden{display:none}
        .chat-input{flex:1;padding:11px 18px;background:rgba(0,0,0,.85);
            border:2px solid rgba(0,255,157,.5);border-radius:26px;
            color:#00ff9d;font-size:14px;outline:none}
        .chat-input::placeholder{color:rgba(0,255,157,.4)}
        .chat-input:focus{border-color:#00ff9d;box-shadow:0 0 18px rgba(0,255,157,.25)}
        .chat-send{width:44px;height:44px;min-width:44px;border-radius:50%;border:2px solid rgba(0,255,157,.6);
            background:rgba(0,255,157,.15);color:#00ff9d;font-size:18px;cursor:pointer;
            transition:.2s;display:flex;align-items:center;justify-content:center}
        .chat-send:hover{background:rgba(0,255,157,.3);border-color:#00ff9d}

        /* === MIC BUTTON — always visible, big, centered === */
        .mic-btn{
            position:fixed !important;
            bottom:22px !important;
            left:50% !important;
            transform:translateX(-50%) !important;
            width:70px;height:70px;border-radius:50%;
            z-index:9999 !important;
            background:rgba(0,10,20,.9);
            border:3px solid #00ff9d;
            cursor:pointer;
            display:flex !important;
            align-items:center;justify-content:center;
            box-shadow:0 0 28px rgba(0,255,157,.6),0 0 60px rgba(0,255,157,.2);
            transition:box-shadow .3s}
        .mic-btn:hover{box-shadow:0 0 40px rgba(0,255,157,.9),0 0 90px rgba(0,255,157,.35)}
        .mic-btn:active{transform:translateX(-50%) scale(.91) !important}
        .mic-btn svg{width:28px;height:28px;fill:#00ff9d;filter:drop-shadow(0 0 8px rgba(0,255,157,.9))}
        .mic-btn.listening{
            border-color:#00aaff;background:rgba(0,40,100,.9);
            box-shadow:0 0 35px rgba(0,170,255,.8),0 0 90px rgba(0,170,255,.3);
            animation:mic-glow 0.7s ease-in-out infinite}
        .mic-btn.listening svg{fill:#00aaff;filter:drop-shadow(0 0 8px rgba(0,170,255,.9))}
        .mic-btn.talking{border-color:#00ff9d;animation:mic-glow-talk .4s ease-in-out infinite}
        @keyframes mic-glow{0%,100%{box-shadow:0 0 25px rgba(0,170,255,.6),0 0 70px rgba(0,170,255,.25)}50%{box-shadow:0 0 50px rgba(0,170,255,1),0 0 110px rgba(0,170,255,.5)}}
        @keyframes mic-glow-talk{0%,100%{box-shadow:0 0 25px rgba(0,255,157,.5)}50%{box-shadow:0 0 55px rgba(0,255,157,1)}}
        .mic-label{
            position:fixed !important;
            bottom:96px !important;
            left:50% !important;
            transform:translateX(-50%) !important;
            z-index:9999 !important;
            color:rgba(0,255,157,.85);
            font-size:10px;letter-spacing:2px;
            text-transform:uppercase;pointer-events:none;white-space:nowrap;
            text-shadow:0 0 10px rgba(0,255,157,.5);
            animation:fade-pulse 3s ease-in-out infinite}
        @keyframes fade-pulse{0%,100%{opacity:.5}50%{opacity:1}}

        /* === Config overlay === */
        .config-overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
        .config-overlay.hidden{display:none}
        .config-title{font-size:26px;color:#00ff9d;letter-spacing:10px;margin-bottom:25px;text-shadow:0 0 20px rgba(0,255,157,.7)}
        .config-form{width:100%;max-width:380px}
        .cfg-label{display:block;color:#00ff9d;font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
        .cfg-input{width:100%;padding:12px;background:rgba(0,255,157,.08);border:1.5px solid #00ff9d;border-radius:8px;
            color:#fff;font-size:13px;margin-bottom:16px;outline:none;transition:.3s}
        .cfg-input:focus{background:rgba(0,255,157,.15);box-shadow:0 0 15px rgba(0,255,157,.2)}
        .cfg-input.ta{min-height:80px;resize:none}
        .cfg-btn{width:100%;padding:14px;background:linear-gradient(135deg,#00ff9d,#00aaff);border:none;border-radius:8px;
            color:#000;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:3px;cursor:pointer;margin-top:6px;transition:.2s}
        .cfg-btn:active{transform:scale(.97);box-shadow:0 0 25px rgba(0,255,157,.4)}
        .cfg-hint{color:rgba(255,255,255,.4);font-size:11px;margin-top:16px;text-align:center}

        /* === Loading === */
        .loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;display:none}
        .loading.active{display:flex;flex-direction:column;align-items:center;gap:12px}
        .spinner{width:50px;height:50px;border:2px solid rgba(0,255,157,.25);border-top-color:#00ff9d;border-radius:50%;animation:spin 1s linear infinite}
        .load-text{color:rgba(0,255,157,.6);font-size:11px;letter-spacing:2px;text-transform:uppercase}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* === Hints === */
        .hint{position:fixed;bottom:8px;font-size:9px;color:rgba(0,255,157,.25);z-index:50}
        .hint-l{left:10px}
        .hint-r{right:10px}
    </style>
</head>
<body>
    <div class="atmosphere"></div>
    <div class="scanlines"></div>
    <canvas id="avatar-canvas"></canvas>
    <canvas id="particles"></canvas>
    <div class="holo-glow"></div>

    <div class="branding" id="branding">A V A</div>

    <div class="avatar-selector" id="avatar-selector">
        <div class="avatar-dot active" data-i="0" style="background:#00ff9d" title="AVA"></div>
        <div class="avatar-dot" data-i="1" style="background:#ff69b4" title="KIRA"></div>

        <div class="avatar-dot" data-i="6" style="background:#00ffff" title="YUKI"></div>

        <div class="avatar-dot" data-i="8" style="background:#6600ff" title="MIRA"></div>

    <div class="capability" id="cap-panel">

    <div class="base-ring idle" id="base-ring"></div>

    <div class="status-area">
        <div class="status-text" id="status-text">INICIANDO...</div>
        <div class="transcript" id="transcript"></div>

    </div>

    <div class="chat-box" id="chat-box">
        <input type="text" class="chat-input" id="chat-input" placeholder="Escribe tu mensaje...">
        <button class="chat-send" id="chat-send">&#9654;</button>
    </div>

    <div class="mic-label" id="mic-label">&#127908; Clic o Space para hablar</div>
    <div class="mic-btn" id="mic-btn">
        <svg viewBox="0 0 24 24" id="mic-icon"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        <svg viewBox="0 0 24 24" id="stop-icon" style="display:none"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
    </div>

    <div class="loading" id="loading"><div class="spinner"></div><div class="load-text" id="load-text">CARGANDO</div></div>

    <div class="config-overlay" id="config-overlay">
        <div class="config-title">A V A</div>
        <div class="config-form">
            <label class="cfg-label">Nombre del usuario</label>
            <input type="text" class="cfg-input" id="cfg-user" placeholder="Tu nombre (ej: Guillermo)">
            <label class="cfg-label">URL del Endpoint (dejar vacío para usar /api/chat)</label>
            <input type="text" class="cfg-input" id="cfg-api" placeholder="/api/chat">
            <label class="cfg-label">URL base de avatares VRM (opcional)</label>
            <input type="text" class="cfg-input" id="cfg-vrm" placeholder="https://tu-cdn.com/vrm/ (deja vacío para usar /public/)">
            <button class="cfg-btn" id="cfg-go">ACTIVAR AVA</button>
            <div class="cfg-hint">Ctrl+R resetea config | T: texto | Space: voz | 1-0: avatar</div>
        </div>
    </div>

    <div class="hint hint-l" id="version-hint">AVA v2.0 — Claude AI</div>
    <div class="hint hint-r">T:texto | Space:voz | 1-0:avatar | N:next</div>

    <!-- Three.js r134 + GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
    // ================================================================
    // CONFIG & STATE
    // ================================================================
    const NAMES   = ['AVA','KIRA','ZANE','FAKER','SAO','NEON','YUKI','REI','MIRA','KAI'];
    const COLORS  = [0x00ff9d,0xff69b4,0xff3333,0x00aaff,0xaa66ff,0xffaa00,0x00ffff,0xff0066,0x6600ff,0x66ff00];
    // Voice profiles per avatar: [pitch, rate, lang preference]
    const VOICES = {
        0: {pitch:1.05, rate:1.0,  pref:'female'},   // AVA - profesional, serena
        1: {pitch:1.35, rate:1.15, pref:'female'},   // KIRA - enérgica, joven
        2: {pitch:0.85, rate:0.92, pref:'female'},   // ZANE - firme, grave
        3: {pitch:0.95, rate:1.05, pref:'female'},   // FAKER - coach, precisa
        4: {pitch:1.15, rate:0.95, pref:'female'},   // SAO - elegante, pausada
        5: {pitch:1.25, rate:1.1,  pref:'female'},   // NEON - rápida, tech
        6: {pitch:1.4,  rate:1.0,  pref:'female'},   // YUKI - suave, creativa
        7: {pitch:0.9,  rate:1.08, pref:'female'},   // REI - directa, técnica
        8: {pitch:1.2,  rate:0.88, pref:'female'},   // MIRA - tranquila, empática
        9: {pitch:1.1,  rate:1.12, pref:'female'},   // KAI - carismática, social
    };
    const CAPS = {
        0:{t:'ASISTENTE HOLOGRÁFICA',s:['BI & Datos','Gestión de agenda','Asistente personal','Apoyo emocional']},
        1:{t:'COMPAÑERA DE GAMING',s:['Coaching','Análisis de partidas','Estrategias','Motivación']},
        2:{t:'ALIADO TÁCTICO',s:['Táctica','Análisis de oponentes','Presión','Comandos de voz']},
        3:{t:'COACH PRO ESPORTS',s:['Entrenamiento pro','Técnicas avanzadas','Rendimiento','Competitivo']},
        4:{t:'ASISTENTE EJECUTIVA',s:['Networking','Comunicación','Proyectos','Presentaciones']},
        5:{t:'CYBER SPECIALIST',s:['Seguridad digital','Automatización','DevOps','Multiplataforma']},
        6:{t:'ARTISTA DIGITAL',s:['Diseño visual','Ideas creativas','Arte digital','Edición']},
        7:{t:'TECH SPECIALIST',s:['Hardware','Software','Optimización','Troubleshooting']},
        8:{t:'COACH BIENESTAR',s:['Fitness','Meditación','Nutrición','Manejo de estrés']},
        9:{t:'SOCIAL CONNECTOR',s:['Comunicación','Networking','Comunidades','Eventos']}
    };

    const VRM_FILES = [
        '5664079130297924007.vrm','3477026897357566765.vrm','1620000625477528222.vrm',
        '6395041283196423502.vrm','7413598465746914517.vrm','6842341930685658330.vrm',
        '4141371705774241586.vrm','247388737517495633.vrm','7062840423830520603.vrm',
        '6851268443831277502.vrm'
    ];

    let cfg = {
        apiUrl: localStorage.getItem('ava_api') || '/api/chat',
        userName: localStorage.getItem('ava_user') || '',
        vrmBase: localStorage.getItem('ava_vrm_base') || ''
    };

    let state = 'IDLE';
    let currentIdx = 0;
    let msgHistory = [];
    let recognition = null;
    const synth = window.speechSynthesis;

    // ================================================================
    // THREE.JS
    // ================================================================
    let scene, camera, renderer, avatarGroup, avatar;
    let particles3d = [];
    let time = 0;
    let currentVRM = null, loadedModel = null;
    let vrmBlend = {mouth:null, blink:null, all:[]};
    let _vrmGen = 0;
    const clock = new THREE.Clock();

    // Mouse tracking
    let mx = 0, my = 0;
    document.addEventListener('mousemove', e => {
        mx = (e.clientX / innerWidth) * 2 - 1;
        my = -(e.clientY / innerHeight) * 2 + 1;
    });

    // LookAt target for VRM eye/head tracking
    let lookAtTarget = null;

    // TTS audio analysis
    let ttsCtx = null, ttsAnalyser = null, ttsFreq = null, _curAudio = null;

    // ================================================================
    // AUTONOMOUS MOVEMENT FSM (Wandering)
    // ================================================================
    const AMOVE = {
        state: 'IDLE',      // IDLE | WALK | GREET | STOP
        timer: 0,           // time remaining in current state
        targetX: 0,         // world X target
        targetRY: 0,        // target rotation Y
        greetArm: false,
        nextState(t) {
            const r = Math.random();
            if (r < 0.35) { this.state = 'WALK';  this.timer = 2 + Math.random() * 3; this.targetX = (Math.random() - 0.5) * 1.4; this.targetRY = (Math.random() - 0.5) * 0.8; }
            else if (r < 0.55) { this.state = 'GREET'; this.timer = 1.5 + Math.random(); this.greetArm = Math.random() > 0.5; }
            else { this.state = 'STOP'; this.timer = 1.5 + Math.random() * 2; }
        }
    };

    // ================================================================
    // THREE-VRM LOADER (bulletproof)
    // ================================================================
    function getVRM() {
        if (typeof THREE !== 'undefined' && THREE.VRM) return THREE.VRM;
        const g = typeof globalThis !== 'undefined' ? globalThis : window;
        const p = g.THREE_VRM || (typeof THREE_VRM !== 'undefined' ? THREE_VRM : null);
        return p && p.VRM ? p.VRM : null;
    }

    function loadScript(src) {
        return new Promise((ok, fail) => {
            const s = document.createElement('script');
            s.src = src; s.async = false;
            s.onload = () => ok(src);
            s.onerror = () => fail(src);
            document.head.appendChild(s);
        });
    }

    async function ensureVRM() {
        if (getVRM()) return true;
        const srcs = [
            'https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.11/lib/three-vrm.js',
            'https://unpkg.com/@pixiv/three-vrm@0.6.11/lib/three-vrm.js',
            '/api/three-vrm.js'
        ];
        for (const src of srcs) {
            try {
                await loadScript(src);
                if (getVRM()) { console.log('three-vrm loaded from:', src); return true; }
            } catch(e) { console.warn('VRM lib fail:', src); }
        }
        console.error('Could not load three-vrm from any source');
        return false;
    }

    // ================================================================
    // SCENE SETUP
    // ================================================================
    function initScene() {
        const canvas = document.getElementById('avatar-canvas');
        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 0.65, 3.8);
        camera.lookAt(0, 0.3, 0);

        renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;

        // Lights — balanced for VRM MToon shaders
        scene.add(new THREE.AmbientLight(0xffffff, 0.75));

        const dir = new THREE.DirectionalLight(0xffffff, 1.2);
        dir.position.set(1.5, 2.5, 2);
        scene.add(dir);

        const dir2 = new THREE.DirectionalLight(0xaaddff, 0.4);
        dir2.position.set(-1.5, 1, -1);
        scene.add(dir2);

        // Subtle colored accent from below
        const pt = new THREE.PointLight(0x00ff9d, 0.15, 8);
        pt.position.set(0, -0.5, 1.5);
        scene.add(pt);

        // Holographic grid floor
        const grid = new THREE.GridHelper(8, 30, 0x002a10, 0x001408);
        grid.position.y = -0.98;
        grid.material.opacity = 0.4;
        grid.material.transparent = true;
        scene.add(grid);

        // LookAt target for VRM eye tracking
        lookAtTarget = new THREE.Object3D();
        lookAtTarget.position.set(0, 1.2, 3);
        scene.add(lookAtTarget);

        // Subtle fog
        scene.fog = new THREE.FogExp2(0x000510, 0.06);

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    }

    // ================================================================
    // VRM BLEND SHAPE HELPERS
    // ================================================================
    function cacheBlendShapes(vrm) {
        vrmBlend = {mouth:null, blink:null, all:[]};
        const proxy = vrm.blendShapeProxy;
        if (!proxy) return;

        // In three-vrm 0.6.11, _blendShapeGroups is a Map<string, VRMBlendShapeGroup>
        let names = [];
        const groups = proxy._blendShapeGroups;
        if (groups instanceof Map) {
            names = Array.from(groups.keys());
        } else if (groups && typeof groups[Symbol.iterator] === 'function') {
            for (const g of groups) names.push(typeof g === 'string' ? g : (g.name || ''));
        } else if (Array.isArray(groups)) {
            names = groups.map(g => g.name || '').filter(Boolean);
        } else if (groups && typeof groups === 'object') {
            names = Object.keys(groups);
        }

        // If nothing found, use VRM 0.x standard presets
        if (names.length === 0) {
            names = ['a','i','u','e','o','blink','blink_l','blink_r','joy','angry','sorrow','fun','neutral'];
        }
        vrmBlend.all = names;

        // Find mouth — standard VRM presets: a, i, u, e, o
        const mouthKeys = ['a','i','u','e','o'];
        for (const key of mouthKeys) {
            const found = names.find(n => n.toLowerCase() === key);
            if (found) { vrmBlend.mouth = found; break; }
        }
        if (!vrmBlend.mouth) {
            vrmBlend.mouth = names.find(n => /mouth|opened|mth|jaw|lip/i.test(n)) || 'a';
        }

        // Find blink
        vrmBlend.blink = names.find(n => n.toLowerCase() === 'blink') ||
                         names.find(n => /blink/i.test(n)) || 'blink';

        console.log('BlendShapes available:', names, '| Mouth:', vrmBlend.mouth, '| Blink:', vrmBlend.blink);
    }

    function setBlend(proxy, name, val) {
        if (!proxy || !name) return;
        try { proxy.setValue(name, Math.max(0, Math.min(1, val))); } catch(e) {}
    }

    // ================================================================
    // VRM URL CANDIDATES
    // ================================================================
    function vrmUrls(idx) {
        const name = VRM_FILES[Math.min(Math.max(0, idx), VRM_FILES.length - 1)];
        const urls = [];
        const base = cfg.vrmBase.trim();
        if (base) urls.push(base.replace(/\/$/, '') + '/' + name);
        const isLocal = ['localhost','127.0.0.1','[::1]',''].includes(location.hostname);
        if (isLocal) {
            urls.push('/public/' + name, '/' + name);
        } else {
            urls.push('/' + name, '/public/' + name);
        }
        return [...new Set(urls)];
    }

    // ================================================================
    // LOAD VRM AVATAR
    // ================================================================
    function loadVRMAvatar(idx) {
        const gen = ++_vrmGen;
        clearAvatar();
        avatarGroup = new THREE.Group();
        currentVRM = null;
        loadedModel = null;
        vrmBlend = {mouth:null, blink:null, all:[]};
        const color = COLORS[idx];
        const urls = vrmUrls(idx);
        const VRM = getVRM();

        showLoading('CARGANDO AVATAR ' + NAMES[idx] + '...');

        if (!VRM) {
            console.warn('three-vrm not available, using placeholder');
            hideLoading();
            createPlaceholder(idx);
            return;
        }

        const loader = new THREE.GLTFLoader();

        const onDone = (gltf) => {
            if (gen !== _vrmGen) return;
            VRM.from(gltf).then(vrm => {
                if (gen !== _vrmGen) return;
                const model = vrm.scene;
                model.scale.setScalar(0.92);
                model.position.y = -0.95;
                model.rotation.y = Math.PI;

                currentVRM = vrm;
                loadedModel = model;
                try { cacheBlendShapes(vrm); } catch(e) { console.warn('BlendShape cache skipped:', e.message); }

                // Set up VRM lookAt to follow mouse target
                if (vrm.lookAt && lookAtTarget) {
                    vrm.lookAt.target = lookAtTarget;
                }

                model.traverse(o => {
                    if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; }
                });

                // Apply natural rest pose immediately (avoid T-pose on load)
                applyRestPose(vrm);

                avatarGroup.add(model);
                addBase(color);
                addParticles3D(color);
                scene.add(avatarGroup);
                avatar = avatarGroup;
                updateUI();
                hideLoading();
                updateStatus('LISTA');
            }).catch(err => {
                console.error('VRM parse error:', err);
                hideLoading();
                createPlaceholder(idx);
            });
        };

        const tryUrl = (i) => {
            if (i >= urls.length) {
                hideLoading();
                createPlaceholder(idx);
                return;
            }
            updateLoadText('VRM ' + (i+1) + '/' + urls.length);
            loader.load(urls[i], onDone,
                p => { if (p.total > 0) updateLoadText(Math.round(p.loaded/p.total*100) + '%'); },
                () => tryUrl(i + 1)
            );
        };
        tryUrl(0);
    }

    // ================================================================
    // BASE & PARTICLES
    // ================================================================
    function addBase(color) {
        const c = new THREE.Color(color);
        const ring = new THREE.Mesh(
            new THREE.RingGeometry(0.4, 0.5, 64),
            new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthWrite: false })
        );
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = -0.94;
        ring.renderOrder = -1;
        avatarGroup.add(ring);

        // Inner glow disc
        const disc = new THREE.Mesh(
            new THREE.CircleGeometry(0.38, 64),
            new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.06, side: THREE.DoubleSide, depthWrite: false })
        );
        disc.rotation.x = -Math.PI / 2;
        disc.position.y = -0.93;
        disc.renderOrder = -2;
        avatarGroup.add(disc);
    }

    function addParticles3D(color) {
        particles3d = [];
        for (let i = 0; i < 25; i++) {
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.012 + Math.random() * 0.012, 8, 8),
                new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5 })
            );
            const angle = Math.random() * Math.PI * 2;
            const r = 0.5 + Math.random() * 0.5;
            const h = -0.3 + Math.random() * 2;
            p.position.set(Math.cos(angle) * r, h, Math.sin(angle) * r);
            p.userData = { angle, r, h, speed: 0.004 + Math.random() * 0.008, fSpeed: 0.4 + Math.random() * 0.5, fOff: Math.random() * Math.PI * 2 };
            avatarGroup.add(p);
            particles3d.push(p);
        }
    }

    function clearAvatar() {
        if (avatarGroup) scene.remove(avatarGroup);
        avatarGroup = new THREE.Group();
        particles3d = [];
    }

    // ================================================================
    // AUTONOMOUS ANIMATION ENGINE
    // ================================================================
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        time += delta;
        const t = time;

        if (!avatar) { renderer.render(scene, camera); return; }

        if (currentVRM) {
            animateVRM(t, delta);
        } else {
            animatePlaceholder(t);
        }

        // 3D particles orbit
        particles3d.forEach((p, i) => {
            p.userData.angle += p.userData.speed;
            p.position.x = Math.cos(p.userData.angle) * p.userData.r;
            p.position.z = Math.sin(p.userData.angle) * p.userData.r;
            p.position.y = p.userData.h + Math.sin(t * p.userData.fSpeed + p.userData.fOff) * 0.12;
            p.material.opacity = 0.3 + Math.sin(t * 1.5 + i) * 0.25;
        });

        renderer.render(scene, camera);
    }

    // ---- VRM animation (autonomous + reactive) ----
    function animateVRM(t, delta) {
        const vrm = currentVRM;
        const humanoid = vrm.humanoid;
        if (!humanoid) return;

        const B = (name) => humanoid.getBoneNode ? humanoid.getBoneNode(name) : null;
        const lerp = THREE.MathUtils.lerp;

        // Update lookAt target from mouse position (FAST response)
        if (lookAtTarget) {
            const tgtX = mx * 3;
            const tgtY = my * 2 + 1.2;
            lookAtTarget.position.x = lerp(lookAtTarget.position.x, tgtX, 0.3);
            lookAtTarget.position.y = lerp(lookAtTarget.position.y, tgtY, 0.3);
            lookAtTarget.position.z = 3;
        }

        // Subtle float
        avatarGroup.position.y = Math.sin(t * 1.8) * 0.012;

        // --- WANDERING FSM (only when not talking/listening) ---
        if (state === 'IDLE') {
            AMOVE.timer -= delta;
            if (AMOVE.timer <= 0) AMOVE.nextState(t);

            if (AMOVE.state === 'WALK') {
                avatarGroup.position.x = lerp(avatarGroup.position.x, AMOVE.targetX, 0.025);
                avatarGroup.rotation.y = lerp(avatarGroup.rotation.y, AMOVE.targetRY, 0.04);
            } else if (AMOVE.state === 'STOP' || AMOVE.state === 'GREET') {
                avatarGroup.position.x = lerp(avatarGroup.position.x, 0, 0.02);
                // Face camera when stopped
                avatarGroup.rotation.y = lerp(avatarGroup.rotation.y, Math.sin(t * 0.18) * 0.12, 0.04);
            } else {
                // IDLE sway
                const swayY = Math.sin(t * 0.25) * 0.18 + Math.sin(t * 0.42) * 0.08;
                avatarGroup.rotation.y = lerp(avatarGroup.rotation.y, swayY, 0.04);
            }
        } else if (state === 'LISTENING') {
            // Face user when listening
            avatarGroup.position.x = lerp(avatarGroup.position.x, 0, 0.04);
            avatarGroup.rotation.y = lerp(avatarGroup.rotation.y, mx * 0.15, 0.06);
        } else if (state === 'THINKING') {
            avatarGroup.rotation.y = lerp(avatarGroup.rotation.y, Math.sin(t * 0.6) * 0.2, 0.03);
        } else {
            avatarGroup.rotation.y = lerp(avatarGroup.rotation.y, Math.sin(t * 0.4) * 0.15 + mx * 0.1, 0.05);
        }

        // --- SPINE / CHEST: breathing + weight shift ---
        const spine = B('spine'), chest = B('chest');
        const breathRate = state === 'TALKING' ? 1.6 : 0.95;
        if (spine) {
            spine.rotation.x = Math.sin(t * breathRate) * 0.04;
            spine.rotation.z = Math.sin(t * 0.5) * 0.025 + Math.sin(t * 0.18) * 0.015;
            spine.rotation.y = Math.sin(t * 0.22) * 0.02;
        }
        if (chest) {
            chest.rotation.x = Math.sin(t * breathRate + 0.5) * 0.035;
            chest.rotation.z = Math.sin(t * 0.5 + 0.3) * 0.02;
            chest.rotation.y = Math.sin(t * 0.3) * 0.015;
        }

        // --- HEAD: responsive mouse follow + autonomous look ---
        const head = B('head');
        if (head) {
            const mouseW = state === 'IDLE' ? 0.55 : 0.7;
            const autoW = 1 - mouseW;

            // Autonomous looking patterns
            const autoY = Math.sin(t * 0.18) * 0.2 + Math.sin(t * 0.4) * 0.12 + Math.cos(t * 0.09) * 0.08;
            const autoX = Math.sin(t * 0.22) * 0.1 + Math.cos(t * 0.32) * 0.06;

            let tgtY = mx * 0.5 * mouseW + autoY * autoW;
            let tgtX = my * 0.3 * mouseW + autoX * autoW - 0.03;

            if (state === 'THINKING') { tgtY += Math.sin(t * 0.8) * 0.18; tgtX += 0.1; }
            if (state === 'TALKING')  { tgtY += Math.sin(t * 3) * 0.08; tgtX += Math.sin(t * 5) * 0.04; }

            head.rotation.y = lerp(head.rotation.y || 0, tgtY, 0.15);
            head.rotation.x = lerp(head.rotation.x || 0, tgtX, 0.15);
        }

        // --- NECK: follows head gently ---
        const neck = B('neck');
        if (neck) {
            neck.rotation.y = lerp(neck.rotation.y || 0, mx * 0.12 + Math.sin(t * 0.4) * 0.06, 0.1);
            neck.rotation.x = lerp(neck.rotation.x || 0, my * 0.06 + Math.sin(t * 0.55) * 0.03, 0.1);
        }

        // --- HIPS: weight shifting + sway ---
        const hips = B('hips');
        if (hips) {
            if (state === 'IDLE') {
                hips.rotation.z = Math.sin(t * 0.55) * 0.05 + Math.sin(t * 0.18) * 0.02;
                hips.rotation.y = Math.sin(t * 0.35) * 0.04;
                hips.rotation.x = Math.sin(t * 0.4) * 0.015;
            } else if (state === 'TALKING') {
                hips.rotation.z = Math.sin(t * 1.8) * 0.06;
                hips.rotation.y = Math.sin(t * 1.4) * 0.05;
                hips.rotation.x = Math.sin(t * 2) * 0.02;
            } else if (state === 'LISTENING') {
                hips.rotation.z = Math.sin(t * 0.7) * 0.03;
                hips.rotation.y = mx * 0.04 + Math.sin(t * 0.5) * 0.02;
            } else {
                hips.rotation.z = Math.sin(t * 0.9) * 0.04;
                hips.rotation.y = Math.sin(t * 0.7) * 0.03;
            }
        }

        // --- ARMS: natural poses per state (never T-pose) ---
        const la = B('leftUpperArm'), ra = B('rightUpperArm');
        const lf = B('leftLowerArm'), rf = B('rightLowerArm');
        const lh = B('leftHand'),     rh = B('rightHand');
        const sp = 0.06;

        // Breathing-linked shoulder micro-movement
        const breathShoulder = Math.sin(t * (state === 'TALKING' ? 1.6 : 0.95)) * 0.015;

        if (state === 'IDLE') {
            if (AMOVE.state === 'GREET') {
                // Wave gesture — one arm raised
                const wave = Math.sin(t * 5.5) * 0.3;
                if (AMOVE.greetArm) {
                    if (la) { la.rotation.z = lerp(la.rotation.z, -0.95 + wave, 0.14); la.rotation.x = lerp(la.rotation.x, 0.25, 0.1); }
                    if (ra) { ra.rotation.z = lerp(ra.rotation.z, -(1.25 + breathShoulder + Math.sin(t*0.8)*0.06), sp); ra.rotation.x = lerp(ra.rotation.x, 0.04 + Math.sin(t*0.5)*0.03, sp); }
                    if (lf) { lf.rotation.y = lerp(lf.rotation.y, 0.15 + wave*0.4, 0.1); lf.rotation.x = lerp(lf.rotation.x, -0.1, 0.08); }
                    if (rf) { rf.rotation.y = lerp(rf.rotation.y, -0.12, sp); }
                } else {
                    if (ra) { ra.rotation.z = lerp(ra.rotation.z, 0.95 - wave, 0.14); ra.rotation.x = lerp(ra.rotation.x, 0.25, 0.1); }
                    if (la) { la.rotation.z = lerp(la.rotation.z,  1.25 + breathShoulder + Math.sin(t*0.8+1)*0.06, sp); la.rotation.x = lerp(la.rotation.x, 0.04 + Math.sin(t*0.5)*0.03, sp); }
                    if (rf) { rf.rotation.y = lerp(rf.rotation.y, -(0.15 + wave*0.4), 0.1); rf.rotation.x = lerp(rf.rotation.x, -0.1, 0.08); }
                    if (lf) { lf.rotation.y = lerp(lf.rotation.y, 0.12, sp); }
                }
            } else if (AMOVE.state === 'WALK') {
                // Arms swing with walk rhythm
                const swing = Math.sin(t * 1.8) * 0.18;
                if (la) { la.rotation.z = lerp(la.rotation.z,  1.2 + breathShoulder, sp); la.rotation.x = lerp(la.rotation.x,  swing + 0.04, sp); }
                if (ra) { ra.rotation.z = lerp(ra.rotation.z, -1.2 + breathShoulder, sp); ra.rotation.x = lerp(ra.rotation.x, -swing + 0.04, sp); }
                if (lf) { lf.rotation.y = lerp(lf.rotation.y,  0.1 + Math.sin(t*1.8)*0.05, sp); }
                if (rf) { rf.rotation.y = lerp(rf.rotation.y, -0.1 - Math.sin(t*1.8)*0.05, sp); }
                if (lh) { lh.rotation.z = lerp(lh.rotation.z,  0.04, sp); }
                if (rh) { rh.rotation.z = lerp(rh.rotation.z, -0.04, sp); }
            } else {
                // Natural relaxed idle pose — arms at sides, gentle sway
                const swayL = Math.sin(t*0.6+1.0)*0.06 + Math.sin(t*0.22)*0.03;
                const swayR = Math.sin(t*0.6+0.0)*0.06 + Math.sin(t*0.22+1)*0.03;
                if (la) { la.rotation.z = lerp(la.rotation.z,  1.28 + breathShoulder + swayL, sp); la.rotation.x = lerp(la.rotation.x,  0.05 + Math.sin(t*0.4)*0.03, sp); }
                if (ra) { ra.rotation.z = lerp(ra.rotation.z, -1.28 + breathShoulder - swayR, sp); ra.rotation.x = lerp(ra.rotation.x,  0.05 + Math.sin(t*0.4+0.6)*0.03, sp); }
                if (lf) { lf.rotation.y = lerp(lf.rotation.y,  0.10 + Math.sin(t*0.55)*0.05, sp); lf.rotation.x = lerp(lf.rotation.x,  0.04, sp); }
                if (rf) { rf.rotation.y = lerp(rf.rotation.y, -0.10 - Math.sin(t*0.55+0.5)*0.05, sp); rf.rotation.x = lerp(rf.rotation.x,  0.04, sp); }
                if (lh) { lh.rotation.z = lerp(lh.rotation.z,  0.06 + Math.sin(t*0.3)*0.04, sp); lh.rotation.x = lerp(lh.rotation.x, Math.sin(t*0.45)*0.06, sp); }
                if (rh) { rh.rotation.z = lerp(rh.rotation.z, -0.06 - Math.sin(t*0.3+1)*0.04, sp); rh.rotation.x = lerp(rh.rotation.x, Math.sin(t*0.45+0.5)*0.06, sp); }
            }
        } else if (state === 'LISTENING') {
            // Attentive: arms slightly forward, slight lean
            if (la) { la.rotation.z = lerp(la.rotation.z,  1.1 + breathShoulder + Math.sin(t*1.1)*0.05, 0.05); la.rotation.x = lerp(la.rotation.x, -0.1 + Math.sin(t*0.7)*0.04, 0.05); }
            if (ra) { ra.rotation.z = lerp(ra.rotation.z, -1.1 + breathShoulder + Math.sin(t*1.1+0.4)*0.05, 0.05); ra.rotation.x = lerp(ra.rotation.x, -0.1 + Math.sin(t*0.7+0.3)*0.04, 0.05); }
            if (lf) { lf.rotation.y = lerp(lf.rotation.y,  0.14 + Math.sin(t*1.4)*0.06, sp); lf.rotation.x = lerp(lf.rotation.x, 0.06, sp); }
            if (rf) { rf.rotation.y = lerp(rf.rotation.y, -0.14 - Math.sin(t*1.4+0.5)*0.06, sp); rf.rotation.x = lerp(rf.rotation.x, 0.06, sp); }
            if (lh) { lh.rotation.z = lerp(lh.rotation.z,  0.08, sp); }
            if (rh) { rh.rotation.z = lerp(rh.rotation.z, -0.08, sp); }
        } else if (state === 'THINKING') {
            // Right hand near chin, left relaxed at side
            if (la) { la.rotation.z = lerp(la.rotation.z,  1.2 + breathShoulder, 0.04); la.rotation.x = lerp(la.rotation.x,  0.04, 0.04); }
            if (ra) { ra.rotation.z = lerp(ra.rotation.z, -0.55, 0.04); ra.rotation.x = lerp(ra.rotation.x, -0.35 + Math.sin(t*1.3)*0.08, 0.04); }
            if (rf) { rf.rotation.y = lerp(rf.rotation.y, -0.5 + Math.sin(t*2.5)*0.12, 0.04); rf.rotation.x = lerp(rf.rotation.x, 0.1, 0.04); }
            if (rh) { rh.rotation.z = lerp(rh.rotation.z, -0.1 + Math.sin(t*1.0)*0.08, 0.04); }
            if (lf) { lf.rotation.y = lerp(lf.rotation.y, 0.12, sp); }
            if (lh) { lh.rotation.z = lerp(lh.rotation.z, 0.05, sp); }
        } else if (state === 'TALKING') {
            // Expressive gesticulation — both arms move, hands emphasize
            const gL = Math.sin(t * 2.8) * 0.22 + Math.sin(t * 1.3) * 0.08;
            const gR = Math.sin(t * 2.8 + 1.1) * 0.22 + Math.cos(t * 1.6) * 0.08;
            if (la) { la.rotation.z = lerp(la.rotation.z,  1.0 + gL + breathShoulder, 0.09); la.rotation.x = lerp(la.rotation.x, Math.sin(t*3.0)*0.15, 0.09); }
            if (ra) { ra.rotation.z = lerp(ra.rotation.z, -1.0 + gR + breathShoulder, 0.09); ra.rotation.x = lerp(ra.rotation.x, Math.sin(t*3.0+0.5)*0.15, 0.09); }
            if (lf) { lf.rotation.y = lerp(lf.rotation.y,  Math.sin(t*3.2)*0.2, 0.07); lf.rotation.x = lerp(lf.rotation.x, Math.sin(t*2.5)*0.1, 0.07); }
            if (rf) { rf.rotation.y = lerp(rf.rotation.y, -Math.sin(t*3.2+0.5)*0.2, 0.07); rf.rotation.x = lerp(rf.rotation.x, Math.sin(t*2.5+0.3)*0.1, 0.07); }
            if (lh) { lh.rotation.z = lerp(lh.rotation.z, Math.sin(t*3.8)*0.14, 0.09); lh.rotation.x = lerp(lh.rotation.x, Math.sin(t*4.5)*0.1, 0.09); }
            if (rh) { rh.rotation.z = lerp(rh.rotation.z, Math.sin(t*3.8+1)*0.14, 0.09); rh.rotation.x = lerp(rh.rotation.x, Math.sin(t*4.5+0.5)*0.1, 0.09); }
        }

        // --- BLEND SHAPES: lip-sync + blink ---
        const proxy = vrm.blendShapeProxy;
        if (proxy) {
            if (state === 'TALKING') {
                let mOpen = Math.abs(Math.sin(t * 8)) * 0.75;
                if (ttsAnalyser && ttsFreq) {
                    ttsAnalyser.getByteFrequencyData(ttsFreq);
                    let sum = 0;
                    for (let i = 0; i < ttsFreq.length; i++) sum += ttsFreq[i];
                    mOpen = Math.min(1, (sum / ttsFreq.length / 255) * 2.8);
                }
                setBlend(proxy, vrmBlend.mouth, mOpen);
                setBlend(proxy, vrmBlend.blink, 0);
            } else {
                setBlend(proxy, vrmBlend.mouth, 0);
                // Natural blink every ~3-5 seconds
                const blinkT = t % (3 + Math.sin(t * 0.1) * 1.5);
                const isBlinking = blinkT > 2.8;
                setBlend(proxy, vrmBlend.blink, isBlinking ? 1 : 0);
            }
        }

        // --- LEGS: walk cycle (always active, slower when IDLE) ---
        const lleg = B('leftUpperLeg'), rleg = B('rightUpperLeg');
        const llleg = B('leftLowerLeg'), rlleg = B('rightLowerLeg');
        const lfoot = B('leftFoot'), rfoot = B('rightFoot');
        const walkSpeed = state === 'TALKING' ? 2.2 : state === 'LISTENING' ? 1.2 : 1.6;
        const walkAmp  = state === 'TALKING' ? 0.22 : state === 'LISTENING' ? 0.12 : 0.18;
        const walkLerp = 0.12;
        if (lleg) lleg.rotation.x = lerp(lleg.rotation.x||0, Math.sin(t * walkSpeed) * walkAmp, walkLerp);
        if (rleg) rleg.rotation.x = lerp(rleg.rotation.x||0, -Math.sin(t * walkSpeed) * walkAmp, walkLerp);
        if (llleg) llleg.rotation.x = lerp(llleg.rotation.x||0, Math.max(0, Math.sin(t * walkSpeed + 0.8)) * walkAmp * 0.9, walkLerp);
        if (rlleg) rlleg.rotation.x = lerp(rlleg.rotation.x||0, Math.max(0, -Math.sin(t * walkSpeed + 0.8)) * walkAmp * 0.9, walkLerp);
        if (lfoot) lfoot.rotation.x = lerp(lfoot.rotation.x||0, Math.sin(t * walkSpeed) * 0.1, walkLerp);
        if (rfoot) rfoot.rotation.x = lerp(rfoot.rotation.x||0, -Math.sin(t * walkSpeed) * 0.1, walkLerp);

        vrm.update(delta);
    }

    // ---- Placeholder animation ----

                if (ra) { ra.rotation.z = -0.12 - Math.sin(t*1)*0.06; ra.rotation.x = -0.15; }

                avatar.position.y = -0.92 + Math.sin(t * 1.5) * 0.015;

                break;
        }
    }

    // ================================================================
    // INSTANT REST POSE — eliminates T-pose on avatar load
    // ================================================================
    function applyRestPose(vrm) {
        const bones = vrm.humanoid?.humanBones;
        if (!bones) return;
        const get = name => bones[name]?.node;

        // Arms: rotate DOWN from T-pose (z = +/-1.4 rad ≈ 80° down)
        const la = get('leftUpperArm'),  ra = get('rightUpperArm');
        const lf = get('leftLowerArm'),  rf = get('rightLowerArm');
        const lh = get('leftHand'),      rh = get('rightHand');
        if (la) { la.rotation.z =  1.35; la.rotation.x = 0.05; }
        if (ra) { ra.rotation.z = -1.35; ra.rotation.x = 0.05; }
        if (lf) { lf.rotation.y =  0.15; lf.rotation.x = 0.05; }
        if (rf) { rf.rotation.y = -0.15; rf.rotation.x = 0.05; }
        if (lh) { lh.rotation.z =  0.05; }
        if (rh) { rh.rotation.z = -0.05; }

        // Hips: slight weight shift
        const hips = get('hips');
        if (hips) { hips.rotation.z = 0.02; hips.rotation.x = 0.01; }

        // Spine: gentle S-curve
        const spine = get('spine'), chest = get('chest');
        if (spine) { spine.rotation.x = 0.03; spine.rotation.z = 0.01; }
        if (chest) { chest.rotation.x = 0.02; }

        // Legs: feet together, slight natural bend
        const ll = get('leftUpperLeg'),  rl = get('rightUpperLeg');
        const lll = get('leftLowerLeg'), rll = get('rightLowerLeg');
        if (ll)  { ll.rotation.x  = -0.04; ll.rotation.z  =  0.04; }
        if (rl)  { rl.rotation.x  = -0.04; rl.rotation.z  = -0.04; }
        if (lll) { lll.rotation.x =  0.06; }
        if (rll) { rll.rotation.x =  0.06; }
    }

    function initParticles2D() {
        const cv = document.getElementById('particles');
        const ctx = cv.getContext('2d');
        cv.width = innerWidth; cv.height = innerHeight;
        const ps = Array.from({length: 45}, () => ({
            x: Math.random() * cv.width, y: Math.random() * cv.height,
            sz: Math.random() * 1.8 + 0.4, sy: Math.random() * 0.8 + 0.3,
            op: Math.random() * 0.4 + 0.15
        }));
        (function draw() {
            ctx.clearRect(0, 0, cv.width, cv.height);
            ps.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,255,157,${p.op})`; ctx.fill();
                p.y -= p.sy;
                if (p.y < -5) { p.y = cv.height + 5; p.x = Math.random() * cv.width; }
            });
            requestAnimationFrame(draw);
        })();
        window.addEventListener('resize', () => { cv.width = innerWidth; cv.height = innerHeight; });
    }

    async function processMessage(text) {
        setState('THINKING');
        updateStatus('PENSANDO...');
        document.getElementById('response').textContent = '';

        msgHistory.push({ role: 'user', content: text });
        if (msgHistory.length > 12) msgHistory = msgHistory.slice(-12);

        try {
            const res = await fetch(cfg.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: msgHistory,
                    avatarName: NAMES[currentIdx]
                })
            });

            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();

            const reply = data.content?.[0]?.text || data.message || data.response || data.choices?.[0]?.message?.content || data.text || '';
            if (!reply) throw new Error('Empty response');

            msgHistory.push({ role: 'assistant', content: reply });
            document.getElementById('response').textContent = reply.substring(0, 150);
            speak(reply);
        } catch (err) {
            console.error('Chat error:', err);
            const fallback = 'Lo siento, no pude conectar con el servidor. Verifica tu ANTHROPIC_API_KEY.';
            updateStatus('ERROR DE CONEXIÓN');
            speak(fallback);
        }
    }

    // ================================================================

    // STT constructor — stored but NOT used as persistent instance
    // Chrome requires a FRESH instance on every listen attempt
    let _SRClass = null;

    function initSTT() {
        _SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!_SRClass) {
            updateStatus('USA EL TEXTO PARA CHATEAR ↓');
            const micBtn = document.getElementById('mic-btn');

    // Deepgram STT via MediaRecorder — server-side, ultra fast
    // Falls back to Web Speech if DEEPGRAM_API_KEY not set or mic unavailable
    async function startListeningDeepgram() {
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch(e) {
            console.warn('Mic access denied, falling back to Web Speech:', e.message);
            startListening();
            return;
        }

        setState('LISTENING');
        updateStatus('ESCUCHANDO...');
        document.getElementById('transcript').textContent = '';

        const chunks = [];
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus' : 'audio/webm';
        const recorder = new MediaRecorder(stream, { mimeType });

        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

        recorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            if (state !== 'LISTENING') return;
            if (chunks.length === 0) { setState('IDLE'); updateStatus('LISTA'); return; }

            updateStatus('PROCESANDO...');
            const blob = new Blob(chunks, { type: mimeType });
            const reader = new FileReader();
            reader.onloadend = async () => {
                const b64 = reader.result.split(',')[1];
                try {
                    const r = await fetch('/api/stt-deepgram', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ audio: b64, mimeType })
                    });
                    if (!r.ok) throw new Error('Deepgram HTTP ' + r.status);
                    const d = await r.json();
                    const txt = (d.transcript || '').trim();
                    if (txt) {
                        document.getElementById('transcript').textContent = txt;
                        processMessage(txt);
                    } else {
                        // No speech detected
                        setState('IDLE'); updateStatus('LISTA');
                    }
                } catch(e) {
                    console.warn('Deepgram STT unavailable, switching to Web Speech:', e.message);
                    window._deepgramAvailable = false;
                    setState('IDLE'); updateStatus('LISTA');
                    setTimeout(startListening, 100);
                }
            };
            reader.readAsDataURL(blob);
        };

        // Auto-stop after silence: use Web Audio silence detection
        const actx = new AudioContext();
        const src = actx.createMediaStreamSource(stream);
        const analyser = actx.createAnalyser();
        analyser.fftSize = 512;
        src.connect(analyser);
        const buf = new Uint8Array(analyser.frequencyBinCount);
        let silenceMs = 0;
        const CHECK_MS = 100;
        const SILENCE_THRESHOLD = 10;
        const SILENCE_STOP_MS = 1800;
        const MAX_MS = 15000;
        let elapsed = 0;

        recorder.start(100);

        const silenceCheck = setInterval(() => {
            if (state !== 'LISTENING') { clearInterval(silenceCheck); recorder.stop(); actx.close(); return; }
            analyser.getByteFrequencyData(buf);
            const avg = buf.reduce((a,b) => a+b, 0) / buf.length;
            elapsed += CHECK_MS;
            if (avg < SILENCE_THRESHOLD) silenceMs += CHECK_MS;
            else silenceMs = 0;
            if (silenceMs >= SILENCE_STOP_MS || elapsed >= MAX_MS) {
                clearInterval(silenceCheck);
                recorder.stop();
                actx.close();
            }
        }, CHECK_MS);
    }

    function startListening() {
        if (!_SRClass) return;

        // Always create a fresh instance — reusing causes channel-closed errors
        recognition = new _SRClass();
        recognition.lang = 'es-MX';
        recognition.continuous = true;      // keep channel open
        recognition.interimResults = true;  // show partial results
        recognition.maxAlternatives = 1;

        let finalTranscript = '';
        let silenceTimer = null;
        const SILENCE_MS = 1800; // stop after 1.8s of silence

        recognition.onstart = () => {
            setState('LISTENING');
            updateStatus('ESCUCHANDO...');
            document.getElementById('transcript').textContent = '';
            finalTranscript = '';
        };

        recognition.onresult = (e) => {
            let interim = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                const seg = e.results[i][0].transcript;
                if (e.results[i].isFinal) finalTranscript += seg + ' ';
                else interim += seg;
            }
            document.getElementById('transcript').textContent = (finalTranscript + interim).trim();

            // Reset silence timer on each result
            clearTimeout(silenceTimer);
            silenceTimer = setTimeout(() => {
                try { recognition.stop(); } catch(e) {}
            }, SILENCE_MS);
        };

        recognition.onerror = (e) => {
            clearTimeout(silenceTimer);
            if (e.error === 'no-speech') {
                // Just stop cleanly — onend will handle it
                try { recognition.stop(); } catch(_) {}
                return;
            }
            if (e.error === 'aborted') return;
            console.error('STT error:', e.error);
            setState('IDLE'); updateStatus('LISTA');
        };

        recognition.onend = () => {
            clearTimeout(silenceTimer);
            if (state !== 'LISTENING') return;
            const text = finalTranscript.trim() ||
                         document.getElementById('transcript').textContent.trim();
            if (text) {
                processMessage(text);
            } else {
                setState('IDLE'); updateStatus('LISTA');
            }
        };

        try {
            recognition.start();
        } catch(e) {
            console.error('STT start failed:', e);
            setState('IDLE'); updateStatus('LISTA');
        }
    }

    async function toggleMic() {
        // Unlock AudioContext on any user gesture
        if (!ttsCtx) ttsCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (ttsCtx.state === 'suspended') await ttsCtx.resume();
        _userInteracted = true;

        if (state === 'TALKING') { stopSpeaking(); return; }

        if (state === 'LISTENING') {
            // Stop current session
            try { recognition && recognition.stop(); } catch(e) {}
            setState('IDLE'); updateStatus('LISTA');
            return;
        }

        // Try Deepgram first (server-side, best accuracy)
        // If mic/MediaRecorder not available, fall through to Web Speech
        if (window.MediaRecorder && navigator.mediaDevices) {
            startListeningDeepgram();
            return;
        }

        // Fallback: Web Speech API
        if (_SRClass) {
            setTimeout(startListening, 80);
            return;
        }

        // No STT at all — use text
        document.getElementById('chat-input').focus();
        updateStatus('ESCRIBE TU MENSAJE ↓');
    }

    // ================================================================
    // TTS — ElevenLabs → OpenAI → Edge Neural → Browser fallback
    // ================================================================
    let _userInteracted = false;

    // Unlock audio on any first user click/touch
    function _unlockAudio() {
        _userInteracted = true;
        if (!ttsCtx) ttsCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (ttsCtx.state === 'suspended') ttsCtx.resume();
        document.removeEventListener('click', _unlockAudio);
        document.removeEventListener('touchstart', _unlockAudio);
        document.removeEventListener('keydown', _unlockAudio);
    }
    document.addEventListener('click', _unlockAudio);
    document.addEventListener('touchstart', _unlockAudio);
    document.addEventListener('keydown', _unlockAudio);

    async function speak(text) {
        synth.cancel();
        if (_curAudio) { _curAudio.pause(); _curAudio = null; }
        ttsAnalyser = null; ttsFreq = null;

        const clean = text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/#/g,'').replace(/`/g,'').replace(/[\[\]()]/g,'').trim();
        setState('TALKING');
        updateStatus('HABLANDO...');
        document.getElementById('response').textContent = clean.substring(0, 150);

        // If user hasn't interacted yet, show text and skip audio (autoplay policy)
        if (!_userInteracted) {
            document.getElementById('response').textContent = clean.substring(0, 150);
            const done = () => { setState('IDLE'); updateStatus('LISTA'); document.getElementById('response').textContent = ''; };
            setTimeout(done, Math.min(clean.length * 60, 8000));
            return;
        }

        // TTS chain — best quality first, auto-fallback
        const ttsProviders = [
            { url: '/api/tts-elevenlabs', label: 'ElevenLabs'   },
            { url: '/api/tts-deepgram',   label: 'Deepgram Aura' },
            { url: '/api/tts-openai',     label: 'OpenAI TTS'   },
            { url: '/api/tts-edge',       label: 'Edge Neural'  },
        ];
        for (const p of ttsProviders) {
            try {
                const r = await fetch(p.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: clean.substring(0, 500), avatarIndex: currentIdx })
                });
                if (r.ok) {
                    const d = await r.json();
                    if (d.audioContent) {
                        console.log('TTS:', p.label, d.voice || '');
                        await playBase64Audio(d.audioContent);
                        return;
                    }
                }
            } catch(e) { console.warn(p.label, 'fail:', e.message); }
        }
        // Last resort: browser Web Speech
        speakBrowser(clean);
    }

    function playBase64Audio(b64) {
        return new Promise(done => {
            const audio = new Audio('data:audio/mp3;base64,' + b64);
            _curAudio = audio;
            const finish = () => { ttsAnalyser = null; ttsFreq = null; setState('IDLE'); updateStatus('LISTA'); document.getElementById('response').textContent = ''; done(); };
            audio.onended = finish;
            audio.onerror = finish;
            (async () => {
                try {
                    if (!ttsCtx) ttsCtx = new (window.AudioContext || window.webkitAudioContext)();
                    await ttsCtx.resume();
                    const src = ttsCtx.createMediaElementSource(audio);
                    ttsAnalyser = ttsCtx.createAnalyser();
                    ttsAnalyser.fftSize = 256;
                    ttsAnalyser.smoothingTimeConstant = 0.45;
                    ttsFreq = new Uint8Array(ttsAnalyser.frequencyBinCount);
                    src.connect(ttsAnalyser);
                    ttsAnalyser.connect(ttsCtx.destination);
                } catch(e) { console.warn('Lip-sync ctx fail:', e); }
                try { await audio.play(); } catch(e) { console.warn('Play fail:', e); finish(); }
            })();
        });
    }

    function speakBrowser(text) {
        const u = new SpeechSynthesisUtterance(text);
        const vp = VOICES[currentIdx] || VOICES[0];
        u.lang = 'es-MX';
        u.pitch = vp.pitch;
        u.rate = vp.rate;
        const pickVoice = () => {
            const all = synth.getVoices();
            // Priority 1: Neural/Natural Spanish voices (modern browsers)
            const neural = all.filter(v => v.lang.startsWith('es') &&
                (v.name.includes('Neural') || v.name.includes('Natural') ||
                 v.name.includes('Dalia') || v.name.includes('Marina') ||
                 v.name.includes('Elvira') || v.name.includes('Paulina') ||
                 v.name.includes('Abril') || v.name.includes('Ximena')));
            if (neural.length) return neural[currentIdx % neural.length];
            // Priority 2: any online Spanish voice (online = better quality)
            const esOnline = all.filter(v => v.lang.startsWith('es') && !v.localService);
            if (esOnline.length) return esOnline[currentIdx % esOnline.length];
            // Priority 3: any Spanish voice
            const es = all.filter(v => v.lang.startsWith('es'));
            if (es.length) return es[currentIdx % es.length];
            return null;
        };
        const v = pickVoice();
        if (v) { u.voice = v; console.log('Browser TTS voice:', v.name); }
        const done = () => { ttsAnalyser = null; ttsFreq = null; setState('IDLE'); updateStatus('LISTA'); document.getElementById('response').textContent = ''; };
        u.onend = done;
        u.onerror = done;
        synth.speak(u);
    }

    function stopSpeaking() {
        synth.cancel();
        if (_curAudio) { _curAudio.pause(); _curAudio = null; }
        ttsAnalyser = null; ttsFreq = null;
        setState('IDLE'); updateStatus('LISTA');
    }

    // ================================================================
    // UI STATE
    // ================================================================
    function setState(s) {
        state = s;
        const ring = document.getElementById('base-ring');
        const mic = document.getElementById('mic-btn');
        const micI = document.getElementById('mic-icon');
        const stopI = document.getElementById('stop-icon');
        ring.className = 'base-ring ' + s.toLowerCase();
        mic.className = 'mic-btn' + (s === 'LISTENING' ? ' listening' : s === 'TALKING' ? ' talking' : '');
        micI.style.display = (s === 'IDLE' || s === 'LISTENING') ? 'block' : 'none';
        stopI.style.display = (s === 'IDLE' || s === 'LISTENING') ? 'none' : 'block';
    }

    function updateStatus(t) { document.getElementById('status-text').textContent = t; }
    function showLoading(t) { document.getElementById('loading').className = 'loading active'; document.getElementById('load-text').textContent = t || 'CARGANDO'; }
    function hideLoading() { document.getElementById('loading').className = 'loading'; }
    function updateLoadText(t) { document.getElementById('load-text').textContent = t; }

    function updateUI() {
        const c = '#' + COLORS[currentIdx].toString(16).padStart(6, '0');
        document.getElementById('branding').textContent = NAMES[currentIdx].split('').join(' ');
        document.getElementById('branding').style.color = c;
        document.getElementById('branding').style.textShadow = `0 0 20px ${c}88, 0 0 40px ${c}44`;

        document.querySelectorAll('.avatar-dot').forEach((d, i) => d.classList.toggle('active', i === currentIdx));

        const cap = CAPS[currentIdx];
        document.getElementById('cap-title').textContent = cap.t;
        document.getElementById('cap-title').style.color = c;
        document.getElementById('cap-skills').innerHTML = cap.s.map(s => `<span class="skill-tag" style="border-color:${c}88;color:${c}">${s}</span>`).join('');
    }

    // ================================================================
    // CONFIG
    // ================================================================
    function showConfig() { document.getElementById('config-overlay').classList.remove('hidden'); }
    function hideConfig() { document.getElementById('config-overlay').classList.add('hidden'); }

    function saveConfig() {
        const user = document.getElementById('cfg-user').value.trim();
        const api = document.getElementById('cfg-api').value.trim() || '/api/chat';
        const vrm = document.getElementById('cfg-vrm').value.trim();

        cfg.userName = user;
        cfg.apiUrl = api;
        cfg.vrmBase = vrm;

        localStorage.setItem('ava_user', user);
        localStorage.setItem('ava_api', api);
        localStorage.setItem('ava_vrm_base', vrm);

        hideConfig();
        loadVRMAvatar(currentIdx);
    }

    function resetConfig() {
        if (!confirm('¿Resetear configuración?')) return;
        localStorage.removeItem('ava_user');
        localStorage.removeItem('ava_api');
        localStorage.removeItem('ava_vrm_base');
        cfg = { apiUrl: '/api/chat', userName: '', vrmBase: '' };
        showConfig();
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        updateStatus('CARGANDO LIBRERÍAS...');
        const hasVRM = await ensureVRM();

        initScene();
        initParticles2D();
        initSTT();

        // Load first avatar
        loadVRMAvatar(0);

        // Start render loop
        animate();

        // Config check
        document.getElementById('cfg-user').value = cfg.userName;
        document.getElementById('cfg-api').value = cfg.apiUrl;
        document.getElementById('cfg-vrm').value = cfg.vrmBase;

        if (!cfg.userName && cfg.apiUrl === '/api/chat') {
            showConfig();
        }

        // Event listeners
        document.getElementById('mic-btn').addEventListener('click', toggleMic);
        document.getElementById('mic-btn').addEventListener('touchstart', e => { e.preventDefault(); toggleMic(); });

        document.getElementById('cfg-go').addEventListener('click', saveConfig);

        document.querySelectorAll('.avatar-dot').forEach((dot, i) => {
            dot.addEventListener('click', () => {
                currentIdx = i;
                loadVRMAvatar(i);
            });
        });

        // Chat input
        const chatBox = document.getElementById('chat-box');
        const chatIn = document.getElementById('chat-input');
        document.getElementById('chat-send').addEventListener('click', () => {
            const t = chatIn.value.trim();
            if (t) { document.getElementById('transcript').textContent = t; processMessage(t); chatIn.value = ''; }
        });
        chatIn.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const t = chatIn.value.trim();
                if (t) { document.getElementById('transcript').textContent = t; processMessage(t); chatIn.value = ''; }
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            const isText = document.activeElement === chatIn;

            if (e.key === 't' && !e.ctrlKey && !e.repeat && !isText && state !== 'TALKING') {
                e.preventDefault(); chatIn.focus(); updateStatus('MODO TEXTO'); return;
            }
            if (e.key === 'Escape') { chatIn.blur(); if (state === 'IDLE') updateStatus('LISTA'); return; }
            if (e.code === 'Space' && !e.repeat && !isText) { e.preventDefault(); toggleMic(); return; }
            if (e.ctrlKey && e.key === 'r') { e.preventDefault(); resetConfig(); return; }
            if (!isText && !e.ctrlKey) {
                if (e.key >= '1' && e.key <= '9') { e.preventDefault(); currentIdx = parseInt(e.key) - 1; loadVRMAvatar(currentIdx); }
                if (e.key === '0') { e.preventDefault(); currentIdx = 9; loadVRMAvatar(9); }
                if (e.key === 'n') { e.preventDefault(); currentIdx = (currentIdx + 1) % 10; loadVRMAvatar(currentIdx); }
            }
        });

        // Voices
        synth.onvoiceschanged = () => synth.getVoices();

        updateStatus('LISTA');
        console.log('AVA v2.0 initialized with Claude AI');

        // Show first autonomous phrase quickly (text-only until user interacts)
        setTimeout(startAutonomousSpeech, 4000);
    }

    // ================================================================
    // AUTONOMOUS SPEECH — avatar speaks on its own
    // ================================================================
    const AUTO_PHRASES = [
        // Greetings & presence
        '{name}, ¿en qué puedo ayudarte hoy?',
        'Aquí estoy, lista cuando me necesites.',
        '¿Tienes alguna pregunta para mí?',
        'Puedo ayudarte con {cap}. ¿Por dónde empezamos?',
        // Personality-based observations
        'Soy {avatar}. Mi especialidad es {cap}.',
        'Estoy procesando nuevas ideas para ti.',
        '¿Sabías que puedo hablar de {cap}? Solo pregunta.',
        'Buen momento para explorar algo nuevo.',
        // Prompts to interact
        'Presiona Space o el micrófono para hablarme.',
        'También puedes escribirme abajo si lo prefieres.',
        '¿Tienes algo en mente? Cuéntame.',
        'Estoy escuchando... cuando quieras.',
    ];

    let _autoSpeechTimer = null;
    let _autoEnabled = true;

    function getAutoPhrase() {
        const cap = CAPS[currentIdx];
        const skills = cap?.s || ['asistencia'];
        const skill = skills[Math.floor(Math.random() * skills.length)];
        const name = cfg.userName || 'amigo';
        const avatar = NAMES[currentIdx];
        const phrase = AUTO_PHRASES[Math.floor(Math.random() * AUTO_PHRASES.length)];
        return phrase
            .replace('{name}', name)
            .replace('{cap}', skill)
            .replace('{avatar}', avatar);
    }

    function startAutonomousSpeech() {
        if (!_autoEnabled) return;
        scheduleNextAutoSpeech();
    }

    function scheduleNextAutoSpeech() {
        const delay = (12 + Math.random() * 20) * 1000;
        _autoSpeechTimer = setTimeout(async () => {
            if (!_autoEnabled) return;
            if (state !== 'IDLE') {
                _autoSpeechTimer = setTimeout(scheduleNextAutoSpeech, 8000);
                return;
            }
            const phrase = getAutoPhrase();
            // Always show text on screen
            document.getElementById('response').textContent = phrase.substring(0, 150);
            setState('TALKING');
            updateStatus('HABLANDO...');

            if (_userInteracted) {
                // User has clicked — audio is unlocked, use full speak()
                speak(phrase);
            } else {
                // No interaction yet — show text only, animate mouth
                const readTime = Math.min(phrase.length * 55, 7000);
                setTimeout(() => {
                    setState('IDLE');
                    updateStatus('LISTA');
                    document.getElementById('response').textContent = '';
                    scheduleNextAutoSpeech();
                }, readTime);
                return;
            }

            // Wait for speech to finish then schedule next
            const wait = setInterval(() => {
                if (state === 'IDLE') { clearInterval(wait); scheduleNextAutoSpeech(); }
            }, 400);
        }, delay);
    }

    window.addEventListener('load', init);
    </script>
</body>
</html>
