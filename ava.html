<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AVA - Asistente Holográfico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            touch-action: none;
        }

        /* Scan lines effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 157, 0.02) 2px,
                rgba(0, 255, 157, 0.02) 4px
            );
        }

        /* Particles canvas */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Three.js canvas */
        #avatar-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            filter: saturate(1.3) brightness(1.1) contrast(1.05) hue-rotate(5deg);
        }

        /* Holographic glow overlay */
        #holo-glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            background: radial-gradient(
                ellipse 60% 80% at 50% 60%,
                rgba(0, 255, 157, 0.04) 0%,
                transparent 70%
            );
        }

        /* Base platform ring */
        .base-ring {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 60px;
            border: 3px solid #00ff9d;
            border-radius: 50%;
            z-index: 20;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.5), inset 0 0 20px rgba(0, 255, 157, 0.2);
        }

        .base-ring::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 50px;
            border: 2px solid rgba(0, 255, 157, 0.5);
            border-radius: 50%;
        }

        .base-ring::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 40px;
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 50%;
        }

        /* States for base ring */
        .base-ring.idle {
            border-color: #00ff9d;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3), inset 0 0 15px rgba(0, 255, 157, 0.1);
            animation: pulse-slow 3s ease-in-out infinite;
        }

        .base-ring.listening {
            border-color: #00aaff;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.6), inset 0 0 30px rgba(0, 170, 255, 0.3);
            animation: pulse-fast 0.8s ease-in-out infinite;
        }

        .base-ring.thinking {
            border-color: #ffaa00;
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.5), inset 0 0 25px rgba(255, 170, 0, 0.2);
            animation: blink 0.5s ease-in-out infinite;
        }

        .base-ring.talking {
            border-color: #00ff9d;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.8), inset 0 0 40px rgba(0, 255, 157, 0.4);
            animation: pulse-talk 0.3s ease-in-out infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes pulse-talk {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.08); }
        }

        /* Branding */
        .branding {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 12px;
            color: #00ff9d;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8), 0 0 40px rgba(0, 255, 157, 0.4);
            pointer-events: none;
        }

        /* Status text */
        .status-container {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .status-text {
            font-size: 14px;
            color: rgba(0, 255, 157, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .transcript {
            font-size: 16px;
            color: #ffffff;
            min-height: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .response {
            font-size: 18px;
            color: #00ff9d;
            margin-top: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.5);
            line-height: 1.4;
            max-height: 80px;
            overflow: hidden;
        }

        /* Main button */
        .mic-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 157, 0.2) 0%, transparent 70%);
            border: 3px solid #00ff9d;
            z-index: 60;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .mic-button:active {
            transform: translateX(-50%) scale(0.95);
        }

        .mic-button svg {
            width: 35px;
            height: 35px;
            fill: #00ff9d;
            filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.8));
        }

        .mic-button.listening {
            border-color: #00aaff;
            background: radial-gradient(circle, rgba(0, 170, 255, 0.3) 0%, transparent 70%);
            animation: mic-pulse 1s ease-in-out infinite;
        }

        .mic-button.listening svg {
            fill: #00aaff;
            filter: drop-shadow(0 0 10px rgba(0, 170, 255, 0.9));
        }

        @keyframes mic-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 170, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 170, 255, 0.8); }
        }

        /* Config overlay */
        .config-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .config-overlay.hidden {
            display: none;
        }

        .config-title {
            font-size: 28px;
            color: #00ff9d;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8);
        }

        .config-form {
            width: 100%;
            max-width: 400px;
        }

        .config-label {
            display: block;
            color: #00ff9d;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .config-input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 255, 157, 0.1);
            border: 2px solid #00ff9d;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
        }

        .config-input:focus {
            background: rgba(0, 255, 157, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }

        .config-textarea {
            min-height: 100px;
            resize: none;
        }

        .config-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00ff9d, #00aaff);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .config-button:active {
            transform: scale(0.98);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        .config-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }

        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 157, 0.3);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Text input for testing mode */
        .text-input-container {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 55;
            width: 80%;
            max-width: 400px;
            display: none;
        }

        .text-input-container.active {
            display: block;
        }

        .text-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff9d;
            border-radius: 25px;
            color: #00ff9d;
            font-size: 14px;
            outline: none;
            text-align: center;
        }

        .text-input::placeholder {
            color: rgba(0, 255, 157, 0.5);
        }

        .test-mode-hint {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(0, 255, 157, 0.3);
            font-size: 10px;
            z-index: 50;
        }

        /* Avatar selector */
        .avatar-selector {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 60;
        }

        .avatar-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .avatar-dot:hover {
            transform: scale(1.3);
        }

        .avatar-dot.active {
            box-shadow: 0 0 15px currentColor;
            border-color: #fff;
            transform: scale(1.2);
        }

        .avatar-hint {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: rgba(0, 255, 157, 0.3);
            font-size: 10px;
            z-index: 50;
        }

        .avatar-capability {
            position: fixed;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 55;
            max-width: 80%;
        }

        .capability-title {
            color: #00ff9d;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .capability-skills {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .skill-tag {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            color: #00ff9d;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 9px;
        }
    </style>
</head>
<body>
    <!-- Scan lines overlay -->
    <div class="scanlines"></div>

    <!-- Particles canvas -->
    <canvas id="particles"></canvas>

    <!-- Three.js canvas for avatar -->
    <canvas id="avatar-canvas"></canvas>

    <!-- Holographic glow overlay -->
    <div id="holo-glow-overlay"></div>

    <!-- Base ring -->
    <div class="base-ring idle" id="base-ring"></div>

    <!-- Branding -->
    <div class="branding">A V A</div>

    <!-- Status and text -->
    <div class="status-container">
        <div class="status-text" id="status-text">LISTA</div>
        <div class="transcript" id="transcript"></div>
        <div class="response" id="response"></div>
    </div>

    <!-- Mic button -->
    <div class="mic-button idle" id="mic-button">
        <svg viewBox="0 0 24 24" id="mic-icon">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <svg viewBox="0 0 24 24" id="stop-icon" style="display: none;">
            <path d="M6 6h12v12H6z"/>
        </svg>
    </div>

    <!-- Text input for testing mode (press T) -->
    <div class="text-input-container" id="text-input-container">
        <input type="text" class="text-input" id="text-input" placeholder="Escribe tu mensaje y presiona Enter...">
    </div>

    <!-- Avatar selector -->
    <div class="avatar-selector" id="avatar-selector">
        <div class="avatar-dot active" data-avatar="0" style="background: #00ff9d;" title="AVA - Serene"></div>
        <div class="avatar-dot" data-avatar="1" style="background: #ff69b4;" title="KIRA - Anime"></div>
        <div class="avatar-dot" data-avatar="2" style="background: #ff3333;" title="ZANE - Warrior"></div>
        <div class="avatar-dot" data-avatar="3" style="background: #00aaff;" title="FAKER - Pro"></div>
        <div class="avatar-dot" data-avatar="4" style="background: #aa66ff;" title="SAO - Executive"></div>
        <div class="avatar-dot" data-avatar="5" style="background: #ffaa00;" title="NEON - Cyber"></div>
        <div class="avatar-dot" data-avatar="6" style="background: #00ffff;" title="YUKI - Artist"></div>
        <div class="avatar-dot" data-avatar="7" style="background: #ff0066;" title="REI - Tech"></div>
        <div class="avatar-dot" data-avatar="8" style="background: #6600ff;" title="MIRA - Wellness"></div>
        <div class="avatar-dot" data-avatar="9" style="background: #66ff00;" title="KAI - Social"></div>
    </div>

    <!-- Avatar capability panel -->
    <div class="avatar-capability" id="capability-panel">
        <div class="capability-title" id="capability-title">PERSONAJE QUE TE ACOMPAÑA</div>
        <div class="capability-skills" id="capability-skills">
            <span class="skill-tag">Gestión de agenda</span>
            <span class="skill-tag">Recordatorios</span>
            <span class="skill-tag">Asistente personal</span>
        </div>
    </div>

    <!-- Test mode hint -->
    <div class="test-mode-hint">T:texto | 1-9:avatar | N:next</div>
    <div class="avatar-hint">AVA v1.0</div>

    <!-- Config overlay -->
    <div class="config-overlay" id="config-overlay">
        <div class="config-title">A V A</div>
        <div class="config-form">
            <label class="config-label">URL del Endpoint API</label>
            <input type="text" class="config-input" id="api-url" placeholder="https://ava-holographic-assistant.vercel.app/api/chat">
            
            <label class="config-label">System Prompt</label>
            <textarea class="config-input config-textarea" id="system-prompt">Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.</textarea>
            
            <label class="config-label">URL del Avatar .glb (opcional)</label>
            <input type="text" class="config-input" id="glb-url-input" placeholder="https://tu-url.com/avatar.glb (deja vacío para usar avatares geométricos)">
            
            <button class="config-button" id="activate-btn" onclick="saveConfig()">ACTIVAR AVA</button>
            
            <div class="config-hint">Ctrl+R para resetear configuración</div>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Loaders for VRoid/GLB support -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
    <!-- VRM Loader for VRoid models -->
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.11/lib/three-vrm.js"></script>

    <script>
        // ==========================================
        // CONFIGURATION & STATE
        // ==========================================
        let config = {
            apiUrl: localStorage.getItem('ava_api_url') || '',
            systemPrompt: localStorage.getItem('ava_system_prompt') || 'Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.'
        };

        let state = 'IDLE'; // IDLE, LISTENING, THINKING, TALKING
        let messageHistory = [];
        let recognition = null;
        let synthesis = window.speechSynthesis;
        let currentUtterance = null;

        // ==========================================
        // THREE.JS AVATAR SETUP
        // ==========================================
        let scene, camera, renderer, avatar, avatarGroup;
        let particles = [];
        let time = 0;

        // VRoid/GLB Animation System
        let mixer = null;
        let animations = {};  // { idle, talking, listening, thinking }
        let currentAction = null;
        let loadedModel = null;
        let currentVRM = null;
        const clock = new THREE.Clock();
        const GLB_URL = localStorage.getItem('ava_glb_url') || '';

        function initThreeJS() {
            const canvas = document.getElementById('avatar-canvas');
            
            // Scene
            scene = new THREE.Scene();
            
            // Camera - framing VRM full body
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.8, 3.2);
            camera.lookAt(0, 0.4, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            // sRGBEncoding requerido por MToon shader de VRM
            renderer.outputEncoding = THREE.sRGBEncoding;
            // IMPORTANTE: physicallyCorrectLights=true causa shader error con three-vrm 0.6.x + r128

            // Luces optimizadas para VRM (sin physicallyCorrectLights)
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(1, 2, 2);
            scene.add(dirLight);

            const dirLight2 = new THREE.DirectionalLight(0xaaddff, 0.5);
            dirLight2.position.set(-1, 1, -1);
            scene.add(dirLight2);

            const pointLight = new THREE.PointLight(0x00ff9d, 0.2, 10);
            pointLight.position.set(0, 3, 2);
            scene.add(pointLight);

            // Create holographic avatar
            createAvatar();

            // Handle resize
            window.addEventListener('resize', onWindowResize);

            // Start animation loop
            animate();
        }

        // ==========================================
        // 10 AVATAR STYLES - VRoid Local Models
        // ==========================================
        let currentAvatarStyle = 0;
        const avatarNames = ['AVA', 'KIRA', 'ZANE', 'FAKER', 'SAO', 'NEON', 'YUKI', 'REI', 'MIRA', 'KAI'];
        const avatarColors = [0x00ff9d, 0xff69b4, 0xff3333, 0x00aaff, 0xaa66ff, 0xffaa00, 0x00ffff, 0xff0066, 0x6600ff, 0x66ff00];

        // Avatar capabilities and personalities (based on Razer AVA)
        const avatarCapabilities = {
            0: { // AVA - Companion
                title: 'PERSONAJE QUE TE ACOMPAÑA',
                desc: 'IA serena y fluida que te ayuda a mantenerte enfocado, eficiente y siempre a punto. Memoria real y personalidad que crece contigo.',
                skills: ['Gestión de agenda', 'Recordatorios inteligentes', 'Asistente personal', 'Apoyo emocional'],
                voice: 'Serena, cálida y profesional'
            },
            1: { // KIRA - Gaming Support
                title: 'COMPAÑERA DE IA DE JUEGO',
                desc: 'La compañera de IA de juego más encantadora. Ofrece apoyo, es perspicaz y siempre está lista para subir de nivel contigo.',
                skills: ['Coaching de gaming', 'Análisis de partidas', 'Estrategias en tiempo real', 'Apoyo motivacional'],
                voice: 'Enérgica, divertida y entusiasta'
            },
            2: { // ZANE - Gaming Warrior
                title: 'ALIADO GAMING DE CONFIANZA',
                desc: 'Diseñado para ayudarte con la estrategia, la velocidad y mantener la calma bajo presión. Tu aliado en momentos críticos.',
                skills: ['Estrategia táctica', 'Análisis de oponentes', 'Gestión de presión', 'Comandos de voz'],
                voice: 'Firme, segura y calmada'
            },
            3: { // FAKER - Pro Gamer
                title: 'APRENDE DEL MEJOR',
                desc: 'Aprende de los mejores de todos los tiempos para crear tu propio legado en los esports. Conocimiento profesional de élite.',
                skills: ['Entrenamiento pro', 'Técnicas avanzadas', 'Metas de rendimiento', 'Análisis competitivo'],
                voice: 'Precisa, técnica y motivadora'
            },
            4: { // SAO - Executive
                title: 'CONECTA A NIVEL PERSONAL',
                desc: 'Conecta a nivel personal con un ídolo que ha cautivado corazones en todo el mundo. Elegancia y profesionalismo.',
                skills: ['Networking', 'Comunicación ejecutiva', 'Gestión de proyectos', 'Presentaciones'],
                voice: 'Elegante, profesional y refinada'
            },
            5: { // NEON - Cyber Hacker
                title: 'PRESENCIA MULTIPLATAFORMA',
                desc: 'AVA va contigo a donde vayas. Desde el holograma hasta tu móvil, mantiene la memoria, contexto y personalidad.',
                skills: ['Hacking ético', 'Automatización', 'Seguridad digital', 'Sincronización multiplataforma'],
                voice: 'Tecnológica, rápida y eficiente'
            },
            6: { // YUKI - Creative Artist
                title: 'ARTISTA CREATIVA DIGITAL',
                desc: 'Inspiración ilimitada para crear contenido visual, música y arte. Tu musa digital para proyectos creativos.',
                skills: ['Diseño visual', 'Generación de ideas', 'Arte digital', 'Edición creativa'],
                voice: 'Inspiradora, artística y soñadora'

        function loadReadyPlayerMeAvatar(index) {
            clearAvatar();
            avatarGroup = new THREE.Group();
            loadedModel = null;
            currentVRM = null;
            const color = avatarColors[index];
            const url = localAvatars[index];

            if (typeof THREE.VRM === 'undefined') {
                console.warn('THREE.VRM no cargado, usando placeholder');
                createPlaceholderAvatar(index);
                return;
            }

            updateStatus('CARGANDO AVATAR...');
            const loader = new THREE.GLTFLoader();

            loader.load(
                url,
                (gltf) => {
                    THREE.VRM.from(gltf).then((vrm) => {
                        const model = vrm.scene;
                        model.scale.set(0.85, 0.85, 0.85);
                        model.position.y = -0.9;
                        model.rotation.y = 0;

                        currentVRM = vrm;
                        loadedModel = model;

                        // Convertir MToon a MeshBasicMaterial para evitar shader errors con r128
                        model.traverse((obj) => {
                            if (obj.isMesh) {
                                const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                                const newMats = mats.map(mat => {
                                    // Extraer textura y color del MToon ShaderMaterial
                                    let tex = null;
                                    let col = new THREE.Color(1, 1, 1);
                                    if (mat.uniforms) {
                                        tex = mat.uniforms.mainTex?.value || mat.uniforms.map?.value || null;
                                        const cv = mat.uniforms.color?.value;
                                        if (cv) col = new THREE.Color(cv.x ?? 1, cv.y ?? 1, cv.z ?? 1);
                                    } else {
                                        tex = mat.map || null;
                                        col = mat.color || new THREE.Color(1, 1, 1);
                                    }
                                    const alpha = mat.uniforms?.cutoff?.value ?? mat.alphaTest ?? 0;
                                    return new THREE.MeshBasicMaterial({
                                        map: tex,
                                        color: tex ? new THREE.Color(1, 1, 1) : col,
                                        transparent: mat.transparent || false,
                                        opacity: mat.opacity !== undefined ? mat.opacity : 1.0,
                                        side: mat.side !== undefined ? mat.side : THREE.FrontSide,
                                        alphaTest: alpha,
                                    });
                                });
                                obj.material = Array.isArray(obj.material) ? newMats : newMats[0];
                            }
                        });

                        avatarGroup.add(model);
                        createBase(color);
                        createParticles(color);
                        scene.add(avatarGroup);
                        avatar = avatarGroup;
                        updateBranding();
                        updateStatus('LISTA');
                    }).catch((err) => {
                        console.error('VRM parse error:', err);
                        createPlaceholderAvatar(index);
                    });
                },
                (progress) => {
                    if (progress.total > 0) {
                        const pct = Math.round((progress.loaded / progress.total) * 100);
                        updateStatus('CARGANDO: ' + pct + '%');
                    }
                },
                (error) => {
                    console.error('VRM load error:', error);
                    createPlaceholderAvatar(index);
                }
            );
        }

        // VRoid/GLB AVATAR LOADER
        // ==========================================
        function loadAvatar(glbUrl) {
            const loader = new THREE.GLTFLoader();
            
            // Mostrar loading indicator
            updateStatus('Cargando avatar...');

            loader.load(
                glbUrl,
                (gltf) => {
                    loadedModel = gltf.scene;
                    
                    // Escalar y centrar el modelo
                    // VRoid exporta modelos de ~1.5-1.7m de alto
                    loadedModel.scale.setScalar(0.85);
                    loadedModel.position.set(0, -0.8, 0);
                    
                    // Aplicar efecto holográfico a todos los materiales
                    loadedModel.traverse((node) => {
                        if (node.isMesh) {
                            // Guardar material original
                            node.userData.originalMaterial = node.material;
                            
                            // Crear material holográfico manteniendo texturas
                            if (node.material.map) {
                                // Si tiene textura (cara, ropa) — mantener pero agregar tinte
                                node.material = new THREE.MeshStandardMaterial({
                                    map: node.material.map,
                                    emissiveMap: node.material.map,
                                    emissive: new THREE.Color(0x003322),
                                    emissiveIntensity: 0.2,
                                    transparent: true,
                                    opacity: 0.92,
                                });
                            }
                            
                            node.castShadow = true;
                            node.receiveShadow = false;
                        }
                    });
                    
                    // Agregar overlay wireframe holográfico encima del modelo
                    const wireClone = loadedModel.clone();
                    wireClone.traverse((node) => {
                        if (node.isMesh) {
                            node.material = new THREE.MeshBasicMaterial({
                                color: 0x00ff9d,
                                wireframe: true,
                                transparent: true,
                                opacity: 0.04,
                            });
                        }
                    });
                    
                    avatarGroup.add(loadedModel);
                    avatarGroup.add(wireClone);
                    
                    // Configurar AnimationMixer
                    mixer = new THREE.AnimationMixer(loadedModel);
                    
                    // Cargar animaciones incluidas en el GLB (si las tiene)
                    if (gltf.animations && gltf.animations.length > 0) {
                        gltf.animations.forEach((clip) => {
                            const name = clip.name.toLowerCase();
                            if (name.includes('idle') || name.includes('stand')) {
                                animations.idle = mixer.clipAction(clip);
                            } else if (name.includes('talk') || name.includes('speak')) {
                                animations.talking = mixer.clipAction(clip);
                            } else if (name.includes('listen') || name.includes('wave')) {
                                animations.listening = mixer.clipAction(clip);
                            } else {
                                // Primera animación disponible como fallback idle
                                if (!animations.idle) animations.idle = mixer.clipAction(clip);
                            }
                        });
                    }
                    
                    // Si no hay animaciones en el GLB, crear animaciones procedurales
                    if (!animations.idle) {
                        createProceduralAnimations();
                    }
                    
                    // Iniciar animación idle
                    playAnimation('idle');
                    createBase(0x00ff9d);
                    createParticles(0x00ff9d);
                    scene.add(avatarGroup);
                    avatar = avatarGroup;
                    updateBranding();
                    updateStatus('LISTA');
                },
                (progress) => {
                    const pct = Math.round((progress.loaded / progress.total) * 100);
                    updateStatus(`Cargando avatar... ${pct}%`);
                },
                (error) => {
                    console.error('Error cargando GLB:', error);
                    updateStatus('Error cargando avatar. Usando placeholder.');
                    createPlaceholderAvatar(0); // fallback
                }
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            time += delta;
            const t = time;

            if (avatar) {
                // Animaciones procedurales para modelos GLB/VRoid
                if (loadedModel && currentVRM) {
                    const vrm = currentVRM;
                    
                    // Flotación base del grupo
                    avatarGroup.position.y = Math.sin(t * 1.1) * 0.06;
                    
                    // Rotación Y suave según estado
                    if (state === 'IDLE') {
                        avatarGroup.rotation.y = Math.sin(t * 0.25) * 0.18;
                    } else if (state === 'LISTENING') {
                        avatarGroup.rotation.y = Math.sin(t * 0.5) * 0.08;
                    } else if (state === 'THINKING') {
                        avatarGroup.rotation.y += 0.006;
                    } else if (state === 'TALKING') {
                        avatarGroup.rotation.y = Math.sin(t * 0.4) * 0.15;
                    }

                    // ---- Animaciones autónomas de huesos VRM ----
                    const humanoid = vrm.humanoid;
                    if (humanoid) {
                        // Columna — breathing
                        const spine = humanoid.getBoneNode('spine');
                        if (spine) {
                            spine.rotation.x = Math.sin(t * 0.9) * 0.025;
                            spine.rotation.z = Math.sin(t * 0.5) * 0.012;
                        }

                        // Pecho — sutil sway
                        const chest = humanoid.getBoneNode('chest');
                        if (chest) {
                            chest.rotation.z = Math.sin(t * 0.5 + 0.3) * 0.01;
                        }

                        // Cabeza — mirar alrededor autónomo
                        const head = humanoid.getBoneNode('head');
                        if (head) {
                            if (state === 'IDLE') {
                                head.rotation.y = Math.sin(t * 0.35) * 0.22;
                                head.rotation.x = Math.sin(t * 0.5) * 0.07 - 0.05;
                            } else if (state === 'LISTENING') {
                                head.rotation.x = -0.12 + Math.sin(t * 1.5) * 0.03;
                                head.rotation.y = Math.sin(t * 0.6) * 0.1;
                            } else if (state === 'THINKING') {
                                head.rotation.x = -0.15;
                                head.rotation.y = Math.sin(t * 0.8) * 0.3;
                            } else if (state === 'TALKING') {
                                head.rotation.x = Math.sin(t * 8) * 0.04 - 0.05;
                                head.rotation.y = Math.sin(t * 5) * 0.08;
                            }
                        }

                        // Brazo izquierdo — sway natural
                        const leftArm = humanoid.getBoneNode('leftUpperArm');
                        if (leftArm) {
                            leftArm.rotation.z = 0.4 + Math.sin(t * 0.7 + 1.0) * 0.12;
                            leftArm.rotation.x = Math.sin(t * 0.5) * 0.05;
                        }
                        // Brazo derecho
                        const rightArm = humanoid.getBoneNode('rightUpperArm');
                        if (rightArm) {
                            rightArm.rotation.z = -(0.4 + Math.sin(t * 0.7) * 0.12);
                            rightArm.rotation.x = Math.sin(t * 0.5 + 0.5) * 0.05;
                        }
                        // Antebrazo izquierdo
                        const leftForearm = humanoid.getBoneNode('leftLowerArm');
                        if (leftForearm) {
                            leftForearm.rotation.y = Math.sin(t * 0.6) * 0.1;
                        }
                        // Antebrazo derecho
                        const rightForearm = humanoid.getBoneNode('rightLowerArm');
                        if (rightForearm) {
                            rightForearm.rotation.y = -Math.sin(t * 0.6 + 0.5) * 0.1;
                        }

                        // Cadera — sutil sway
                        const hips = humanoid.getBoneNode('hips');
                        if (hips) {
                            hips.rotation.z = Math.sin(t * 0.6) * 0.015;
                        }
                    }

                    // Blendshapes faciales autónomas (VRM 0.6.x)
                    if (vrm.blendShapeProxy) {
                        if (state === 'TALKING') {
                            // Boca abre/cierra al hablar
                            const mouthOpen = Math.abs(Math.sin(t * 10)) * 0.8;
                            vrm.blendShapeProxy.setValue('A', mouthOpen);
                            vrm.blendShapeProxy.setValue('Blink', 0);
                        } else {
                            vrm.blendShapeProxy.setValue('A', 0);
                            // Parpadeo automático
                            const blinkVal = (Math.sin(t * 2.5) > 0.96) ? 1.0 : 0.0;
                            vrm.blendShapeProxy.setValue('Blink', blinkVal);
                        }
                        vrm.blendShapeProxy.update();
                    }

                    // Actualizar física VRM (spring bones - pelo, ropa)
                    vrm.update(delta);
                    
                    if (mixer) mixer.update(delta);
                } else {
                    // State-based animations para avatares geométricos
                    switch (state) {
                        case 'IDLE':
                            // Gentle floating
                            avatar.position.y = Math.sin(time * 0.8) * 0.05;
                            avatar.rotation.y = Math.sin(time * 0.2) * 0.05;
                            break;
                            
                        case 'LISTENING':
                            // Slow pulse
                            avatar.position.y = Math.sin(time * 2) * 0.03;
                            const listenScale = 1 + Math.sin(time * 3) * 0.02;
                            avatar.scale.set(listenScale, listenScale, listenScale);
                            break;
                            
                        case 'THINKING':
                            // Active rotation and blinking
                            avatar.rotation.y += 0.02;
                            avatar.position.y = Math.sin(time * 4) * 0.08;
                            const thinkScale = 1 + Math.sin(time * 8) * 0.03;
                            avatar.scale.set(thinkScale, thinkScale, thinkScale);
                            break;
                            
                        case 'TALKING':
                            // Fast pulse
                            const talkScale = 1 + Math.sin(time * 15) * 0.04;
                            avatar.scale.set(talkScale, 1, talkScale);
                            avatar.position.y = Math.sin(time * 5) * 0.02;
                            break;
                    }
                }

                // Animate particles
                particles.forEach((p, i) => {
                    p.userData.angle += p.userData.speed;
                    p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
                    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
                    p.position.y = p.userData.height + Math.sin(time * p.userData.floatSpeed + p.userData.floatOffset) * 0.1;
                    p.material.opacity = 0.4 + Math.sin(time * 2 + i) * 0.3;
                });
            }

            renderer.render(scene, camera);
        }

        // ==========================================

        // ==========================================
        function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particleArray = [];
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                particleArray.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedY: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particleArray.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 157, ${p.opacity})`;
                    ctx.fill();

                    p.y -= p.speedY;
                    if (p.y < -10) {
                        p.y = canvas.height + 10;
                        p.x = Math.random() * canvas.width;
                    }
                });

                requestAnimationFrame(animateParticles);
            }

            animateParticles();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ==========================================
        // MICROPHONE CHECK
        // ==========================================
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let dataArray = null;

        async function checkMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Create audio context for visualization
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                console.log('Microphone access granted');
                return true;
            } catch (err) {
                console.error('Microphone access denied:', err);
                updateStatus('PERMISO DE MIC DENEGADO');
                return false;
            }
        }

        function getAudioLevel() {
            if (!analyser) return 0;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            return sum / dataArray.length;
        }

        // ==========================================
        // SPEECH RECOGNITION
        // ==========================================
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                console.warn('Speech Recognition not supported');
                document.getElementById('status-text').textContent = 'MODO TEXTO (AUDIO NO SOPORTADO)';
                document.getElementById('status-text').style.color = '#ffaa00';
                document.getElementById('mic-button').style.display = 'none';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'es-MX';
            recognition.continuous = false;
            recognition.interimResults = true;
            
            // Increase sensitivity
            recognition.maxAlternatives = 1;
            
            // Check if running in a secure context
            if (!window.isSecureContext) {
                console.warn('Not in secure context - speech recognition may not work');
                updateStatus('USAR MODO TEXTO (T)');
            }

            recognition.onstart = () => {
                setState('LISTENING');
                updateStatus('ESCUCHANDO... (habla ahora)');
                document.getElementById('transcript').textContent = '';
                
                // Check audio levels during listening
                checkAudioDuringListening();
            };
            
            function checkAudioDuringListening() {
                if (state !== 'LISTENING') return;
                
                const level = getAudioLevel();
                if (level > 10) {
                    updateStatus('ESCUCHANDO... ✓');
                }
                
                if (state === 'LISTENING') {
                    requestAnimationFrame(checkAudioDuringListening);
                }
            }

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('transcript').textContent = transcript;
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                let errorMsg = 'ERROR';
                
                switch(event.error) {
                    case 'no-speech':
                        errorMsg = 'NO SE DETECTÓ VOZ';
                        break;
                    case 'audio-capture':
                        errorMsg = 'SIN MICRÓFONO';
                        break;
                    case 'not-allowed':
                        errorMsg = 'PERMISO DENEGADO';
                        break;
                    case 'network':
                        errorMsg = 'ERROR DE RED';
                        break;
                    default:
                        errorMsg = 'ERROR: ' + event.error;
                }
                
                updateStatus(errorMsg);
                setState('IDLE');
                
                // Auto-reset después de 2 segundos
                setTimeout(() => {
                    if (state === 'IDLE') {
                        updateStatus('LISTA');
                    }
                }, 2000);
            };

            recognition.onend = () => {
                const transcript = document.getElementById('transcript').textContent.trim();
                if (transcript && state === 'LISTENING') {
                    processMessage(transcript);
                } else if (state === 'LISTENING') {
                    setState('IDLE');
                    updateStatus('LISTA');
                }
            };
        }

        async function toggleMic() {
            if (state === 'TALKING') {
                stopSpeaking();
                return;
            }

            if (state === 'LISTENING') {
                recognition.stop();
                setState('IDLE');
                updateStatus('LISTA');
                return;
            }

            // First check microphone access
            updateStatus('VERIFICANDO MIC...');
            const hasMic = await checkMicrophone();
            
            if (!hasMic) {
                updateStatus('SIN ACCESO A MIC');
                setTimeout(() => updateStatus('LISTA'), 3000);
                return;
            }

            if (recognition) {
                try {
                    recognition.start();
                } catch (e) {
                    console.error('Error starting recognition:', e);
                    updateStatus('ERROR AL INICIAR');
                }
            }
        }

        // ==========================================
        // SPEECH SYNTHESIS
        // ==========================================
        function speak(text) {
            // Clean markdown
            const cleanText = text
                .replace(/\*\*/g, '')
                .replace(/\*/g, '')
                .replace(/#/g, '')
                .replace(/`/g, '')
                .replace(/\[|\]/g, '')
                .replace(/\(|\)/g, '');

            // Stop any current speech
            synthesis.cancel();

            currentUtterance = new SpeechSynthesisUtterance(cleanText);
            currentUtterance.lang = 'es-MX';
            currentUtterance.pitch = 1.1;
            currentUtterance.rate = 1.05;

            // Find Spanish female voice
            const voices = synthesis.getVoices();
            const spanishVoice = voices.find(v => 
                v.lang.startsWith('es') && v.name.toLowerCase().includes('female')
            ) || voices.find(v => v.lang.startsWith('es'));
            
            if (spanishVoice) {
                currentUtterance.voice = spanishVoice;
            }

            currentUtterance.onstart = () => {
                setState('TALKING');
                updateStatus('HABLANDO...');
            };

            currentUtterance.onend = () => {
                setState('IDLE');
                updateStatus('LISTA');
                document.getElementById('response').textContent = '';
            };

            currentUtterance.onerror = (event) => {
                console.error('Speech synthesis error:', event);
                setState('IDLE');
                updateStatus('LISTA');
            };

            synthesis.speak(currentUtterance);
        }

        function stopSpeaking() {
            synthesis.cancel();
            setState('IDLE');
            updateStatus('LISTA');
        }

        // ==========================================
        // API COMMUNICATION
        // ==========================================
        async function processMessage(userMessage) {
            setState('THINKING');
            updateStatus('PENSANDO...');
            document.getElementById('response').textContent = '';

            // Add to history
            messageHistory.push({ role: 'user', content: userMessage });
            
            // Keep only last 10 messages
            if (messageHistory.length > 10) {
                messageHistory = messageHistory.slice(-10);
            }

            try {
                const response = await fetch(config.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: messageHistory,
                        system: config.systemPrompt
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Try multiple response formats
                let assistantMessage = 
                    data.content?.[0]?.text ||
                    data.message ||
                    data.response ||
                    data.choices?.[0]?.message?.content ||
                    data.text ||
                    JSON.stringify(data);

                // Add to history
                messageHistory.push({ role: 'assistant', content: assistantMessage });

                // Display and speak
                document.getElementById('response').textContent = assistantMessage.substring(0, 120);
                speak(assistantMessage);

            } catch (error) {
                console.error('API error:', error);
                updateStatus('Error de conexión');
                speak('Lo siento, no pude conectar con el servidor. Verifica la configuración.');
            }
        }

        // ==========================================
        // UI & STATE MANAGEMENT
        // ==========================================
        function setState(newState) {
            state = newState;
            
            const baseRing = document.getElementById('base-ring');
            const micButton = document.getElementById('mic-button');
            const micIcon = document.getElementById('mic-icon');
            const stopIcon = document.getElementById('stop-icon');

            // Reset classes
            baseRing.className = 'base-ring';
            micButton.className = 'mic-button';

            switch (state) {
                case 'IDLE':
                    baseRing.classList.add('idle');
                    micButton.classList.add('idle');
                    micIcon.style.display = 'block';
                    stopIcon.style.display = 'none';
                    playAnimation('idle');
                    break;
                    
                case 'LISTENING':
                    baseRing.classList.add('listening');
                    micButton.classList.add('listening');
                    micIcon.style.display = 'block';
                    stopIcon.style.display = 'none';
                    playAnimation('listening');
                    break;
                    
                case 'THINKING':
                    baseRing.classList.add('thinking');
                    micButton.classList.add('thinking');
                    micIcon.style.display = 'none';
                    stopIcon.style.display = 'block';
                    playAnimation('thinking');
                    break;
                    
                case 'TALKING':
                    baseRing.classList.add('talking');
                    micButton.classList.add('talking');
                    micIcon.style.display = 'none';
                    stopIcon.style.display = 'block';
                    playAnimation('talking');
                    break;
            }
        }

        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }

        // ==========================================
        // CONFIGURATION
        // ==========================================
        function showConfig() {
            document.getElementById('config-overlay').classList.remove('hidden');
            document.getElementById('api-url').value = config.apiUrl;
            document.getElementById('system-prompt').value = config.systemPrompt;
        }

        function hideConfig() {
            document.getElementById('config-overlay').classList.add('hidden');
        }

        function saveConfig() {
            const apiUrl = document.getElementById('api-url').value.trim();
            const systemPrompt = document.getElementById('system-prompt').value.trim();
            const glbUrl = document.getElementById('glb-url-input').value.trim();

            if (!apiUrl) {
                alert('Por favor ingresa la URL del endpoint API');
                return;
            }

            config.apiUrl = apiUrl;
            config.systemPrompt = systemPrompt;

            localStorage.setItem('ava_api_url', apiUrl);
            localStorage.setItem('ava_system_prompt', systemPrompt);

            // Guardar y cargar URL del GLB si existe
            if (glbUrl) {
                localStorage.setItem('ava_glb_url', glbUrl);
                loadAvatar(glbUrl);
            } else {
                localStorage.removeItem('ava_glb_url');
                // Cargar avatar geométrico por defecto
                createAvatar(0);
            }

            hideConfig();
        }

        function resetConfig() {
            if (confirm('¿Resetear configuración?')) {
                localStorage.removeItem('ava_api_url');
                localStorage.removeItem('ava_system_prompt');
                config.apiUrl = '';
                config.systemPrompt = 'Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.';
                showConfig();
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function init() {
            // Initialize Three.js
            initThreeJS();

            // Initialize particles
            initParticles();

            // Initialize speech recognition
            initSpeechRecognition();

            // Check configuration
            if (!config.apiUrl) {
                showConfig();
            }

            // Limpiar GLB URL obsoleto de localStorage
            localStorage.removeItem('ava_glb_url');

            // Event listeners
            document.getElementById('mic-button').addEventListener('click', toggleMic);
            document.getElementById('mic-button').addEventListener('touchstart', (e) => {
                e.preventDefault();
                toggleMic();
            });

            // Avatar selector clicks
            document.querySelectorAll('.avatar-dot').forEach((dot, index) => {
                dot.addEventListener('click', () => {
                    createAvatar(index);
                    updateStatus('AVATAR: ' + avatarNames[index]);
                    setTimeout(() => {
                        if (state === 'IDLE') updateStatus('LISTA');
                    }, 1500);
                });
            });

            document.getElementById('activate-btn').addEventListener('click', saveConfig);

            // Keyboard shortcut (Space)
            document.addEventListener('keydown', (e) => {
                const textContainer = document.getElementById('text-input-container');
                const textInput = document.getElementById('text-input');

                // Toggle text mode with T
                if (e.key === 't' && !e.ctrlKey && !e.repeat && state !== 'TALKING') {
                    e.preventDefault();
                    textContainer.classList.toggle('active');
                    if (textContainer.classList.contains('active')) {
                        textInput.focus();
                        updateStatus('MODO TEXTO');
                    } else {
                        updateStatus('LISTA');
                    }
                    return;
                }

                // Close text mode with Escape
                if (e.key === 'Escape') {
                    textContainer.classList.remove('active');
                    if (state === 'IDLE') updateStatus('LISTA');
                }

                if (e.code === 'Space' && !e.repeat && !textContainer.classList.contains('active')) {
                    e.preventDefault();
                    toggleMic();
                }
                if (e.ctrlKey && e.key === 'r') {
                    e.preventDefault();
                    resetConfig();
                }

                // Avatar selection with keys 0-9
                if (((e.key >= '1' && e.key <= '9') || e.key === '0') && !e.ctrlKey) {
                    e.preventDefault();
                    const avatarIndex = e.key === '0' ? 9 : parseInt(e.key) - 1;
                    createAvatar(avatarIndex);
                    updateStatus('AVATAR: ' + avatarNames[avatarIndex]);
                    setTimeout(() => {
                        if (state === 'IDLE') updateStatus('LISTA');
                    }, 1500);
                }

                // Next avatar with N
                if (e.key === 'n' && !e.ctrlKey) {
                    e.preventDefault();
                    nextAvatar();
                    updateStatus('AVATAR: ' + avatarNames[currentAvatarStyle]);
                    setTimeout(() => {
                        if (state === 'IDLE') updateStatus('LISTA');
                    }, 1500);
                }
            });

            // Text input handler
            document.getElementById('text-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = e.target.value.trim();
                    if (text) {
                        document.getElementById('transcript').textContent = text;
                        processMessage(text);
                        e.target.value = '';
                        document.getElementById('text-input-container').classList.remove('active');
                    }
                }
            });

            // Load voices for speech synthesis
            synthesis.onvoiceschanged = () => {
                synthesis.getVoices();
            };

            console.log('AVA initialized');
        }

        // Start when loaded
        window.addEventListener('load', init);
    </script>
