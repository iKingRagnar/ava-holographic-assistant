<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AVA - Asistente Holográfico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            touch-action: none;
        }

        /* Scan lines effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 157, 0.02) 2px,
                rgba(0, 255, 157, 0.02) 4px
            );
        }

        /* Particles canvas */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Three.js canvas */
        #avatar-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Base platform ring */
        .base-ring {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 60px;
            border: 3px solid #00ff9d;
            border-radius: 50%;
            z-index: 20;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.5), inset 0 0 20px rgba(0, 255, 157, 0.2);
        }

        .base-ring::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 50px;
            border: 2px solid rgba(0, 255, 157, 0.5);
            border-radius: 50%;
        }

        .base-ring::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 40px;
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 50%;
        }

        /* States for base ring */
        .base-ring.idle {
            border-color: #00ff9d;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3), inset 0 0 15px rgba(0, 255, 157, 0.1);
            animation: pulse-slow 3s ease-in-out infinite;
        }

        .base-ring.listening {
            border-color: #00aaff;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.6), inset 0 0 30px rgba(0, 170, 255, 0.3);
            animation: pulse-fast 0.8s ease-in-out infinite;
        }

        .base-ring.thinking {
            border-color: #ffaa00;
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.5), inset 0 0 25px rgba(255, 170, 0, 0.2);
            animation: blink 0.5s ease-in-out infinite;
        }

        .base-ring.talking {
            border-color: #00ff9d;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.8), inset 0 0 40px rgba(0, 255, 157, 0.4);
            animation: pulse-talk 0.3s ease-in-out infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes pulse-talk {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.08); }
        }

        /* Branding */
        .branding {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 12px;
            color: #00ff9d;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8), 0 0 40px rgba(0, 255, 157, 0.4);
            pointer-events: none;
        }

        /* Status text */
        .status-container {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .status-text {
            font-size: 14px;
            color: rgba(0, 255, 157, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .transcript {
            font-size: 16px;
            color: #ffffff;
            min-height: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .response {
            font-size: 18px;
            color: #00ff9d;
            margin-top: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.5);
            line-height: 1.4;
            max-height: 80px;
            overflow: hidden;
        }

        /* Main button */
        .mic-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 157, 0.2) 0%, transparent 70%);
            border: 3px solid #00ff9d;
            z-index: 60;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .mic-button:active {
            transform: translateX(-50%) scale(0.95);
        }

        .mic-button svg {
            width: 35px;
            height: 35px;
            fill: #00ff9d;
            filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.8));
        }

        .mic-button.listening {
            border-color: #00aaff;
            background: radial-gradient(circle, rgba(0, 170, 255, 0.3) 0%, transparent 70%);
            animation: mic-pulse 1s ease-in-out infinite;
        }

        .mic-button.listening svg {
            fill: #00aaff;
            filter: drop-shadow(0 0 10px rgba(0, 170, 255, 0.9));
        }

        @keyframes mic-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 170, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 170, 255, 0.8); }
        }

        /* Config overlay */
        .config-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .config-overlay.hidden {
            display: none;
        }

        .config-title {
            font-size: 28px;
            color: #00ff9d;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8);
        }

        .config-form {
            width: 100%;
            max-width: 400px;
        }

        .config-label {
            display: block;
            color: #00ff9d;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .config-input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 255, 157, 0.1);
            border: 2px solid #00ff9d;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
        }

        .config-input:focus {
            background: rgba(0, 255, 157, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }

        .config-textarea {
            min-height: 100px;
            resize: none;
        }

        .config-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00ff9d, #00aaff);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .config-button:active {
            transform: scale(0.98);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        .config-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }

        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 157, 0.3);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Text input for testing mode */
        .text-input-container {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 55;
            width: 80%;
            max-width: 400px;
            display: none;
        }

        .text-input-container.active {
            display: block;
        }

        .text-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff9d;
            border-radius: 25px;
            color: #00ff9d;
            font-size: 14px;
            outline: none;
            text-align: center;
        }

        .text-input::placeholder {
            color: rgba(0, 255, 157, 0.5);
        }

        .test-mode-hint {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(0, 255, 157, 0.3);
            font-size: 10px;
            z-index: 50;
        }

        /* Avatar selector */
        .avatar-selector {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 60;
        }

        .avatar-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .avatar-dot:hover {
            transform: scale(1.3);
        }

        .avatar-dot.active {
            box-shadow: 0 0 15px currentColor;
            border-color: #fff;
            transform: scale(1.2);
        }

        .avatar-hint {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: rgba(0, 255, 157, 0.3);
            font-size: 10px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <!-- Scan lines overlay -->
    <div class="scanlines"></div>

    <!-- Particles canvas -->
    <canvas id="particles"></canvas>

    <!-- Three.js canvas for avatar -->
    <canvas id="avatar-canvas"></canvas>

    <!-- Base ring -->
    <div class="base-ring idle" id="base-ring"></div>

    <!-- Branding -->
    <div class="branding">A V A</div>

    <!-- Status and text -->
    <div class="status-container">
        <div class="status-text" id="status-text">LISTA</div>
        <div class="transcript" id="transcript"></div>
        <div class="response" id="response"></div>
    </div>

    <!-- Mic button -->
    <div class="mic-button idle" id="mic-button">
        <svg viewBox="0 0 24 24" id="mic-icon">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <svg viewBox="0 0 24 24" id="stop-icon" style="display: none;">
            <path d="M6 6h12v12H6z"/>
        </svg>
    </div>

    <!-- Text input for testing mode (press T) -->
    <div class="text-input-container" id="text-input-container">
        <input type="text" class="text-input" id="text-input" placeholder="Escribe tu mensaje y presiona Enter...">
    </div>

    <!-- Avatar selector -->
    <div class="avatar-selector" id="avatar-selector">
        <div class="avatar-dot active" data-avatar="0" style="background: #00ff9d;" title="AVA - Serene"></div>
        <div class="avatar-dot" data-avatar="1" style="background: #ff69b4;" title="KIRA - Anime"></div>
        <div class="avatar-dot" data-avatar="2" style="background: #ff3333;" title="ZANE - Warrior"></div>
        <div class="avatar-dot" data-avatar="3" style="background: #00aaff;" title="FAKER - Pro"></div>
        <div class="avatar-dot" data-avatar="4" style="background: #aa66ff;" title="SAO - Executive"></div>
        <div class="avatar-dot" data-avatar="5" style="background: #ffaa00;" title="NEON - Cyber"></div>
    </div>

    <!-- Test mode hint -->
    <div class="test-mode-hint">T:texto | 1-6:avatar | N:next</div>
    <div class="avatar-hint">AVA v1.0</div>

    <!-- Config overlay -->
    <div class="config-overlay" id="config-overlay">
        <div class="config-title">A V A</div>
        <div class="config-form">
            <label class="config-label">URL del Endpoint API</label>
            <input type="text" class="config-input" id="api-url" placeholder="https://ava-holographic-assistant.vercel.app/api/chat">
            
            <label class="config-label">System Prompt</label>
            <textarea class="config-input config-textarea" id="system-prompt">Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.</textarea>
            
            <button class="config-button" id="activate-btn" onclick="saveConfig()">ACTIVAR AVA</button>
            
            <div class="config-hint">Ctrl+R para resetear configuración</div>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ==========================================
        // CONFIGURATION & STATE
        // ==========================================
        let config = {
            apiUrl: localStorage.getItem('ava_api_url') || '',
            systemPrompt: localStorage.getItem('ava_system_prompt') || 'Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.'
        };

        let state = 'IDLE'; // IDLE, LISTENING, THINKING, TALKING
        let messageHistory = [];
        let recognition = null;
        let synthesis = window.speechSynthesis;
        let currentUtterance = null;

        // ==========================================
        // THREE.JS AVATAR SETUP
        // ==========================================
        let scene, camera, renderer, avatar, avatarGroup;
        let particles = [];
        let time = 0;

        function initThreeJS() {
            const canvas = document.getElementById('avatar-canvas');
            
            // Scene
            scene = new THREE.Scene();
            
            // Camera - optimized for portrait
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);
            camera.lookAt(0, 0.5, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Lights
            const ambientLight = new THREE.AmbientLight(0x00ff9d, 0.3);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00ff9d, 1, 10);
            pointLight.position.set(2, 3, 2);
            scene.add(pointLight);

            const pointLight2 = new THREE.PointLight(0x00aaff, 0.8, 10);
            pointLight2.position.set(-2, 2, 2);
            scene.add(pointLight2);

            // Create holographic avatar
            createAvatar();

            // Handle resize
            window.addEventListener('resize', onWindowResize);

            // Start animation loop
            animate();
        }

        // ==========================================
        // 6 AVATAR STYLES - PROJECT AVA INSPIRED
        // ==========================================
        let currentAvatarStyle = 0;
        const avatarNames = ['AVA', 'KIRA', 'ZANE', 'FAKER', 'SAO', 'NEON'];
        const avatarColors = [0x00ff9d, 0xff69b4, 0xff3333, 0x00aaff, 0xaa66ff, 0xffaa00];

        function createMaterial(color) {
            return new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 0.9,
                roughness: 0.2,
                metalness: 0.8
            });
        }

        function createWireframe(color) {
            return new THREE.MeshBasicMaterial({
                color: color,
                wireframe: true,
                transparent: true,
                opacity: 0.3
            });
        }

        function clearAvatar() {
            if (avatarGroup) {
                scene.remove(avatarGroup);
                particles = [];
            }
            avatarGroup = new THREE.Group();
        }

        function createBase(color) {
            const baseGeo = new THREE.CylinderGeometry(0.8, 0.9, 0.1, 32);
            const baseMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.2,
                wireframe: true
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -0.05;
            avatarGroup.add(base);
        }

        function createParticles(color) {
            for (let i = 0; i < 20; i++) {
                const particleGeo = new THREE.SphereGeometry(0.02, 8, 8);
                const particleMat = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.6
                });
                const particle = new THREE.Mesh(particleGeo, particleMat);
                
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.6 + Math.random() * 0.4;
                const height = 0.5 + Math.random() * 1.5;
                
                particle.position.set(
                    Math.cos(angle) * radius,
                    height,
                    Math.sin(angle) * radius
                );
                
                particle.userData = {
                    angle: angle,
                    radius: radius,
                    height: height,
                    speed: 0.005 + Math.random() * 0.01,
                    floatSpeed: 0.5 + Math.random() * 0.5,
                    floatOffset: Math.random() * Math.PI * 2
                };
                
                avatarGroup.add(particle);
                particles.push(particle);
            }
        }

        // AVA - Serene Energy (Default)
        function createAVA() {
            clearAvatar();
            const color = avatarColors[0];
            const mat = createMaterial(color);
            const wire = createWireframe(color);
            const glowMat = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.95
            });
            
            // === HEAD GROUP ===
            const headGroup = new THREE.Group();
            headGroup.position.y = 1.65;
            
            // Face - oval shape
            const headGeo = new THREE.SphereGeometry(0.22, 32, 32);
            headGeo.scale(1, 1.15, 0.95);
            const head = new THREE.Mesh(headGeo, mat);
            headGroup.add(head);
            
            // Hair - styled swept back
            const hairMat = new THREE.MeshStandardMaterial({
                color: 0xffdd88,
                emissive: 0xffcc66,
                emissiveIntensity: 0.3,
                roughness: 0.4
            });
            
            // Main hair volume
            const hairGeo = new THREE.SphereGeometry(0.24, 24, 24, 0, Math.PI * 2, 0, Math.PI * 0.6);
            const hair = new THREE.Mesh(hairGeo, hairMat);
            hair.position.y = 0.08;
            hair.rotation.x = -0.3;
            hair.scale.set(1.05, 1, 1.1);
            headGroup.add(hair);
            
            // Hair strands/swept back
            for (let i = 0; i < 5; i++) {
                const strandGeo = new THREE.CapsuleGeometry(0.03, 0.25, 4, 8);
                const strand = new THREE.Mesh(strandGeo, hairMat);
                const angle = (i - 2) * 0.4;
                strand.position.set(Math.sin(angle) * 0.2, 0.15, -0.15 - Math.abs(i-2)*0.05);
                strand.rotation.x = -0.8 - Math.random() * 0.3;
                strand.rotation.z = angle * 0.5;
                headGroup.add(strand);
            }
            
            // Face wireframe overlay
            const headWire = new THREE.Mesh(headGeo, wire);
            headWire.scale.set(1.02, 1.02, 1.02);
            headGroup.add(headWire);
            
            // Eyes - glowing
            const eyeGeo = new THREE.SphereGeometry(0.035, 16, 16);
            const eyeMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: color,
                emissiveIntensity: 1.5
            });
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.08, 0.02, 0.18);
            headGroup.add(leftEye);
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.08, 0.02, 0.18);
            headGroup.add(rightEye);
            
            // Smile
            const smileGeo = new THREE.TorusGeometry(0.06, 0.008, 8, 16, Math.PI);
            const smile = new THREE.Mesh(smileGeo, glowMat);
            smile.position.set(0, -0.08, 0.19);
            smile.rotation.x = 0.2;
            headGroup.add(smile);
            
            avatarGroup.add(headGroup);
            
            // === BODY ===
            const bodyGroup = new THREE.Group();
            
            // Neck
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.09, 0.2, 16), mat);
            neck.position.y = 1.45;
            avatarGroup.add(neck);
            
            // Torso - athletic fit with jacket
            const torsoGeo = new THREE.CylinderGeometry(0.22, 0.18, 0.55, 16);
            const torso = new THREE.Mesh(torsoGeo, mat);
            torso.position.y = 1.15;
            bodyGroup.add(torso);
            
            // Jacket/shirt details
            const jacketGeo = new THREE.BoxGeometry(0.48, 0.5, 0.3);
            const jacket = new THREE.Mesh(jacketGeo, wire);
            jacket.position.y = 1.15;
            bodyGroup.add(jacket);
            
            // Collar
            const collarGeo = new THREE.TorusGeometry(0.12, 0.02, 8, 16, Math.PI * 1.5);
            const collar = new THREE.Mesh(collarGeo, glowMat);
            collar.position.set(0, 1.38, 0);
            collar.rotation.x = 0.3;
            collar.rotation.z = Math.PI * 0.75;
            bodyGroup.add(collar);
            
            // Shoulders
            const shoulderGeo = new THREE.SphereGeometry(0.14, 16, 16);
            const leftShoulder = new THREE.Mesh(shoulderGeo, mat);
            leftShoulder.position.set(-0.28, 1.32, 0);
            bodyGroup.add(leftShoulder);
            const rightShoulder = new THREE.Mesh(shoulderGeo, mat);
            rightShoulder.position.set(0.28, 1.32, 0);
            bodyGroup.add(rightShoulder);
            
            avatarGroup.add(bodyGroup);
            
            // === ARMS ===
            // Left arm

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            if (avatar) {
                // State-based animations
                switch (state) {
                    case 'IDLE':
                        // Gentle floating
                        avatar.position.y = Math.sin(time * 0.8) * 0.05;
                        avatar.rotation.y = Math.sin(time * 0.2) * 0.05;
                        break;
                        
                    case 'LISTENING':
                        // Slow pulse
                        avatar.position.y = Math.sin(time * 2) * 0.03;
                        const listenScale = 1 + Math.sin(time * 3) * 0.02;
                        avatar.scale.set(listenScale, listenScale, listenScale);
                        break;
                        
                    case 'THINKING':
                        // Active rotation and blinking
                        avatar.rotation.y += 0.02;
                        avatar.position.y = Math.sin(time * 4) * 0.08;
                        const thinkScale = 1 + Math.sin(time * 8) * 0.03;
                        avatar.scale.set(thinkScale, thinkScale, thinkScale);
                        break;
                        
                    case 'TALKING':
                        // Fast pulse
                        const talkScale = 1 + Math.sin(time * 15) * 0.04;
                        avatar.scale.set(talkScale, 1, talkScale);
                        avatar.position.y = Math.sin(time * 5) * 0.02;
                        break;
                }

                // Animate particles
                particles.forEach((p, i) => {
                    p.userData.angle += p.userData.speed;
                    p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
                    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
                    p.position.y = p.userData.height + Math.sin(time * p.userData.floatSpeed + p.userData.floatOffset) * 0.1;
                    p.material.opacity = 0.4 + Math.sin(time * 2 + i) * 0.3;
                });
            }

            renderer.render(scene, camera);
        }

        // ==========================================
        // PARTICLES CANVAS (2D overlay)
        // ==========================================
        function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particleArray = [];
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                particleArray.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedY: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particleArray.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 157, ${p.opacity})`;
                    ctx.fill();

                    p.y -= p.speedY;
                    if (p.y < -10) {
                        p.y = canvas.height + 10;
                        p.x = Math.random() * canvas.width;
                    }
                });

                requestAnimationFrame(animateParticles);
            }

            animateParticles();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ==========================================
        // MICROPHONE CHECK
        // ==========================================
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let dataArray = null;

        async function checkMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Create audio context for visualization
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                console.log('Microphone access granted');
                return true;
            } catch (err) {
                console.error('Microphone access denied:', err);
                updateStatus('PERMISO DE MIC DENEGADO');
                return false;
            }
        }

        function getAudioLevel() {
            if (!analyser) return 0;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            return sum / dataArray.length;
        }

        // ==========================================
        // SPEECH RECOGNITION
        // ==========================================
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                updateStatus('Reconocimiento de voz no soportado');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'es-MX';
            recognition.continuous = false;
            recognition.interimResults = true;
            
            // Increase sensitivity
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                setState('LISTENING');
                updateStatus('ESCUCHANDO... (habla ahora)');
                document.getElementById('transcript').textContent = '';
                
                // Check audio levels during listening
                checkAudioDuringListening();
            };
            
            function checkAudioDuringListening() {
                if (state !== 'LISTENING') return;
                
                const level = getAudioLevel();
                if (level > 10) {
                    updateStatus('ESCUCHANDO... ✓');
                }
                
                if (state === 'LISTENING') {
                    requestAnimationFrame(checkAudioDuringListening);
                }
            }

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('transcript').textContent = transcript;
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                let errorMsg = 'ERROR';
                
                switch(event.error) {
                    case 'no-speech':
                        errorMsg = 'NO SE DETECTÓ VOZ';
                        break;
                    case 'audio-capture':
                        errorMsg = 'SIN MICRÓFONO';
                        break;
                    case 'not-allowed':
                        errorMsg = 'PERMISO DENEGADO';
                        break;
                    case 'network':
                        errorMsg = 'ERROR DE RED';
                        break;
                    default:
                        errorMsg = 'ERROR: ' + event.error;
                }
                
                updateStatus(errorMsg);
                setState('IDLE');
                
                // Auto-reset después de 2 segundos
                setTimeout(() => {
                    if (state === 'IDLE') {
                        updateStatus('LISTA');
                    }
                }, 2000);
            };

            recognition.onend = () => {
                const transcript = document.getElementById('transcript').textContent.trim();
                if (transcript && state === 'LISTENING') {
                    processMessage(transcript);
                } else if (state === 'LISTENING') {
                    setState('IDLE');
                    updateStatus('LISTA');
                }
            };
        }

        async function toggleMic() {
            if (state === 'TALKING') {
                stopSpeaking();
                return;
            }

            if (state === 'LISTENING') {
                recognition.stop();
                setState('IDLE');
                updateStatus('LISTA');
                return;
            }

            // First check microphone access
            updateStatus('VERIFICANDO MIC...');
            const hasMic = await checkMicrophone();
            
            if (!hasMic) {
                updateStatus('SIN ACCESO A MIC');
                setTimeout(() => updateStatus('LISTA'), 3000);
                return;
            }

            if (recognition) {
                try {
                    recognition.start();
                } catch (e) {
                    console.error('Error starting recognition:', e);
                    updateStatus('ERROR AL INICIAR');
                }
            }
        }

        // ==========================================
        // SPEECH SYNTHESIS
        // ==========================================
        function speak(text) {
            // Clean markdown
            const cleanText = text
                .replace(/\*\*/g, '')
                .replace(/\*/g, '')
                .replace(/#/g, '')
                .replace(/`/g, '')
                .replace(/\[|\]/g, '')
                .replace(/\(|\)/g, '');

            // Stop any current speech
            synthesis.cancel();

            currentUtterance = new SpeechSynthesisUtterance(cleanText);
            currentUtterance.lang = 'es-MX';
            currentUtterance.pitch = 1.1;
            currentUtterance.rate = 1.05;

            // Find Spanish female voice
            const voices = synthesis.getVoices();
            const spanishVoice = voices.find(v => 
                v.lang.startsWith('es') && v.name.toLowerCase().includes('female')
            ) || voices.find(v => v.lang.startsWith('es'));
            
            if (spanishVoice) {
                currentUtterance.voice = spanishVoice;
            }

            currentUtterance.onstart = () => {
                setState('TALKING');
                updateStatus('HABLANDO...');
            };

            currentUtterance.onend = () => {
                setState('IDLE');
                updateStatus('LISTA');
                document.getElementById('response').textContent = '';
            };

            currentUtterance.onerror = (event) => {
                console.error('Speech synthesis error:', event);
                setState('IDLE');
                updateStatus('LISTA');
            };

            synthesis.speak(currentUtterance);
        }

        function stopSpeaking() {
            synthesis.cancel();
            setState('IDLE');
            updateStatus('LISTA');
        }

        // ==========================================
        // API COMMUNICATION
        // ==========================================
        async function processMessage(userMessage) {
            setState('THINKING');
            updateStatus('PENSANDO...');
            document.getElementById('response').textContent = '';

            // Add to history
            messageHistory.push({ role: 'user', content: userMessage });
            
            // Keep only last 10 messages
            if (messageHistory.length > 10) {
                messageHistory = messageHistory.slice(-10);
            }

            try {
                const response = await fetch(config.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: messageHistory,
                        system: config.systemPrompt
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Try multiple response formats
                let assistantMessage = 
                    data.content?.[0]?.text ||
                    data.message ||
                    data.response ||
                    data.choices?.[0]?.message?.content ||
                    data.text ||
                    JSON.stringify(data);

                // Add to history
                messageHistory.push({ role: 'assistant', content: assistantMessage });

                // Display and speak
                document.getElementById('response').textContent = assistantMessage.substring(0, 120);
                speak(assistantMessage);

            } catch (error) {
                console.error('API error:', error);
                updateStatus('Error de conexión');
                speak('Lo siento, no pude conectar con el servidor. Verifica la configuración.');
            }
        }

        function setState(newState) {
            state = newState;
            
            const baseRing = document.getElementById('base-ring');

            const stopIcon = document.getElementById('stop-icon');

            // Reset classes
            baseRing.className = 'base-ring';
            micButton.className = 'mic-button';

            switch (state) {
                case 'IDLE':
                    baseRing.classList.add('idle');
                    micButton.classList.add('idle');
                    micIcon.style.display = 'block';
                    stopIcon.style.display = 'none';
                    break;
                    
                case 'LISTENING':
                    baseRing.classList.add('listening');
                    micButton.classList.add('listening');
                    micIcon.style.display = 'block';
                    stopIcon.style.display = 'none';
                    break;
                    
                case 'THINKING':
                    baseRing.classList.add('thinking');
                    micButton.classList.add('thinking');
                    micIcon.style.display = 'none';
                    stopIcon.style.display = 'block';
                    break;
                    
                case 'TALKING':
                    baseRing.classList.add('talking');
                    micButton.classList.add('talking');
                    micIcon.style.display = 'none';
                    stopIcon.style.display = 'block';
                    break;
            }
        }

        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }

        // ==========================================
        // CONFIGURATION
        // ==========================================
        function showConfig() {
            document.getElementById('config-overlay').classList.remove('hidden');
            document.getElementById('api-url').value = config.apiUrl;
            document.getElementById('system-prompt').value = config.systemPrompt;
        }

        function hideConfig() {
            document.getElementById('config-overlay').classList.add('hidden');
        }

        function saveConfig() {
            const apiUrl = document.getElementById('api-url').value.trim();
            const systemPrompt = document.getElementById('system-prompt').value.trim();

            if (!apiUrl) {
                alert('Por favor ingresa la URL del endpoint API');
                return;
            }

            config.apiUrl = apiUrl;
            config.systemPrompt = systemPrompt;

            localStorage.setItem('ava_api_url', apiUrl);
            localStorage.setItem('ava_system_prompt', systemPrompt);

            hideConfig();
        }

        function resetConfig() {
            if (confirm('¿Resetear configuración?')) {
                localStorage.removeItem('ava_api_url');
                localStorage.removeItem('ava_system_prompt');
                config.apiUrl = '';
                config.systemPrompt = 'Eres AVA, una asistente holográfica inteligente y amigable. Responde en español de forma concisa y natural. Tu personalidad es profesional pero cálida.';
                showConfig();
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function init() {
            // Initialize Three.js
            initThreeJS();

            // Initialize particles
            initParticles();

            // Initialize speech recognition
            initSpeechRecognition();

            // Check configuration
            if (!config.apiUrl) {
                showConfig();
            }

            // Event listeners
            document.getElementById('mic-button').addEventListener('click', toggleMic);
            document.getElementById('mic-button').addEventListener('touchstart', (e) => {
                e.preventDefault();
                toggleMic();
            });

            // Avatar selector clicks
            document.querySelectorAll('.avatar-dot').forEach((dot, index) => {
                dot.addEventListener('click', () => {
                    createAvatar(index);
                    updateStatus('AVATAR: ' + avatarNames[index]);
                    setTimeout(() => {
                        if (state === 'IDLE') updateStatus('LISTA');
                    }, 1500);
                });
            });

            document.getElementById('activate-btn').addEventListener('click', saveConfig);

            // Keyboard shortcut (Space)
            document.addEventListener('keydown', (e) => {
                const textContainer = document.getElementById('text-input-container');
                const textInput = document.getElementById('text-input');

                // Toggle text mode with T
                if (e.key === 't' && !e.ctrlKey && !e.repeat && state !== 'TALKING') {
                    e.preventDefault();
                    textContainer.classList.toggle('active');
                    if (textContainer.classList.contains('active')) {
                        textInput.focus();
                        updateStatus('MODO TEXTO');
                    } else {
                        updateStatus('LISTA');
                    }
                    return;
                }

                // Close text mode with Escape
                if (e.key === 'Escape') {
                    textContainer.classList.remove('active');
                    if (state === 'IDLE') updateStatus('LISTA');
                }

                if (e.code === 'Space' && !e.repeat && !textContainer.classList.contains('active')) {
                    e.preventDefault();
                    toggleMic();
                }
                if (e.ctrlKey && e.key === 'r') {
                    e.preventDefault();
                    resetConfig();
                }

                // Avatar selection with keys 1-6
                if (e.key >= '1' && e.key <= '6' && !e.ctrlKey) {
                    e.preventDefault();
                    const avatarIndex = parseInt(e.key) - 1;
                    createAvatar(avatarIndex);
                    updateStatus('AVATAR: ' + avatarNames[avatarIndex]);
                    setTimeout(() => {
                        if (state === 'IDLE') updateStatus('LISTA');
                    }, 1500);
                }

                // Next avatar with N
                if (e.key === 'n' && !e.ctrlKey) {
                    e.preventDefault();
                    nextAvatar();
                    updateStatus('AVATAR: ' + avatarNames[currentAvatarStyle]);
                    setTimeout(() => {
                        if (state === 'IDLE') updateStatus('LISTA');
                    }, 1500);
                }
            });

            // Text input handler
            document.getElementById('text-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = e.target.value.trim();
                    if (text) {
                        document.getElementById('transcript').textContent = text;
                        processMessage(text);
                        e.target.value = '';
                        document.getElementById('text-input-container').classList.remove('active');
                    }
                }
            });

            // Load voices for speech synthesis
            synthesis.onvoiceschanged = () => {
                synthesis.getVoices();
            };

            console.log('AVA initialized');
        }

        // Start when loaded
        window.addEventListener('load', init);
    </script>
</body>
</html>
